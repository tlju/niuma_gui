name: 构建 ARM64 (预编译Qt6)

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.12'
  CACHE_VERSION: v6

jobs:
  build-arm64:
    runs-on: ubuntu-22.04

    steps:
    - name: '1. 检出代码'
      uses: actions/checkout@v6

    - name: '2. 设置 QEMU'
      uses: docker/setup-qemu-action@v4

    - name: '3. 恢复 Python 环境缓存'
      uses: actions/cache@v5
      id: cache-python
      with:
        path: python-env-arm64.tar.gz
        key: ${{ env.CACHE_VERSION }}-python-env-arm64-simple-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ env.CACHE_VERSION }}-python-env-arm64-simple-${{ env.PYTHON_VERSION }}-
          ${{ env.CACHE_VERSION }}-python-env-arm64-simple-

    - name: '4. 准备并构建'
      run: |
        docker run --rm \
          --platform linux/arm64 \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          debian:10.10 \
          bash -c '
            set -e
            
            PYTHON_CACHED="${{ steps.cache-python.outputs.cache-hit }}"
            
            echo "=== 配置 apt 源 (Debian 10 已归档) ==="
            echo "deb http://archive.debian.org/debian buster main" > /etc/apt/sources.list
            echo "deb http://archive.debian.org/debian buster-updates main" >> /etc/apt/sources.list
            echo "Acquire::Check-Valid-Until false;" > /etc/apt/apt.conf.d/99no-check-valid-until
            
            echo "=== 安装系统依赖 ==="
            apt-get update
            apt-get install -y \
              gcc g++ make wget patchelf \
              libxrender1 libxext6 libx11-6 \
              libxcb1 libxkbcommon0 \
              libgl1 libegl1 \
              libxkbcommon-x11-0 \
              libssl1.1 \
              bzip2 libbz2-1.0 \
              libffi6 \
              zlib1g \
              liblzma5 \
              libsqlite3-0 \
              libxcb-cursor0 \
              libxcb-icccm4 \
              libxcb-image0 \
              libxcb-keysyms1 \
              libxcb-randr0 \
              libxcb-render-util0 \
              libxcb-shape0 \
              libxcb-xfixes0 \
              libxcb-xinerama0 \
              libxcb-xkb1 \
              libdbus-1-3 \
              libharfbuzz0b \
              libjpeg62-turbo \
              libpng16-16 \
              libpcre2-16-0 \
              libicu63 \
              libb2-1
            
            if [ "$PYTHON_CACHED" != "true" ]; then
              echo "=== 安装 Qt6 编译依赖 ==="
              apt-get install -y \
                libgl1-mesa-dev \
                libxkbcommon-dev \
                libxcb-xkb-dev \
                libx11-xcb-dev \
                libxcb-icccm4-dev \
                libxcb-image0-dev \
                libxcb-keysyms1-dev \
                libxcb-randr0-dev \
                libxcb-render-util0-dev \
                libxcb-shape0-dev \
                libxcb-xfixes0-dev \
                libxcb-xinerama0-dev \
                libxcb-sync-dev \
                libxcb-shm0-dev \
                libegl1-mesa-dev \
                libwayland-dev \
                wayland-protocols \
                libinput-dev \
                libdrm-dev \
                libgbm-dev \
                libfreetype6-dev \
                libfontconfig1-dev \
                libharfbuzz-dev \
                libjpeg-dev \
                libpng-dev \
                libglib2.0-dev \
                libdbus-1-dev \
                ninja-build \
                perl \
                python3
                
              echo "=== 安装 CMake 3.30 ==="
              cd /tmp
              CMAKE_VERSION=3.30.5
              wget -q https://github.com/Kitware/CMake/releases/download/v${CMAKE_VERSION}/cmake-${CMAKE_VERSION}-linux-aarch64.tar.gz
              tar -xzf cmake-${CMAKE_VERSION}-linux-aarch64.tar.gz
              export PATH=/tmp/cmake-${CMAKE_VERSION}-linux-aarch64/bin:$PATH
              cmake --version
                
              echo "=== 编译 Qt6 (qtbase only) ==="
              cd /tmp
              wget -q https://download.qt.io/official_releases/qt/6.5/6.5.3/submodules/qtbase-everywhere-src-6.5.3.tar.xz
              tar -xf qtbase-everywhere-src-6.5.3.tar.xz
              cd qtbase-everywhere-src-6.5.3
              mkdir build && cd build
              cmake .. \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=/opt/qt6 \
                -DQT_BUILD_EXAMPLES=OFF \
                -DQT_BUILD_TESTS=OFF \
                -DQT_FEATURE_vulkan=OFF \
                -DQT_FEATURE_opengl=ON \
                -DQT_FEATURE_opengles2=ON \
                -DQT_FEATURE_egl=ON \
                -DQT_FEATURE_xcb=ON \
                -DQT_FEATURE_xcb_xlib=ON \
                -DQT_FEATURE_xlib=ON
              cmake --build . --parallel
              cmake --install .
              export PATH="/opt/qt6/bin:$PATH"
              export LD_LIBRARY_PATH="/opt/qt6/lib:$LD_LIBRARY_PATH"
              qmake --version
              
              echo "=== 编译 Python 3.12 ==="
              apt-get install -y \
                libssl-dev \
                libffi-dev \
                zlib1g-dev \
                liblzma-dev \
                libsqlite3-dev \
                libreadline-dev \
                tk-dev \
                libgdbm-dev \
                libbz2-dev \
                xz-utils
                
              cd /tmp
              wget -q https://www.python.org/ftp/python/3.12.13/Python-3.12.13.tgz
              tar xzf Python-3.12.13.tgz
              cd Python-3.12.13
              ./configure --enable-optimizations --prefix=/usr/local/python3.12
              make -j$(nproc)
              make install
              cd /workspace
              
              echo "=== 安装 Python 依赖 ==="
              /usr/local/python3.12/bin/python3.12 -m pip install --upgrade pip setuptools wheel
              /usr/local/python3.12/bin/pip3.12 install --only-binary=:all: PyQt6 PyQt6-Qt6 PyQt6-sip
              
              echo "=== 安装 PyQt6-QScintilla ==="
              export PATH="/opt/qt6/bin:$PATH"
              /usr/local/python3.12/bin/pip3.12 install PyQt6-QScintilla
              
              /usr/local/python3.12/bin/pip3.12 install -r requirements.txt || true
              /usr/local/python3.12/bin/pip3.12 install nuitka ordered-set zstandard
              
              echo "=== 打包 Python 环境 ==="
              cd /usr/local
              tar -czf /workspace/python-env-arm64.tar.gz python3.12
            fi
            
            echo "=== 解压 Python 环境 ==="
            cd /usr/local
            tar -xzf /workspace/python-env-arm64.tar.gz
            ln -sf /usr/local/python3.12/bin/python3.12 /usr/local/bin/python3
            ln -sf /usr/local/python3.12/bin/pip3.12 /usr/local/bin/pip3
            python3 --version
            
            echo "=== 使用 Nuitka 构建 ==="
            cd /workspace
            python3 -m nuitka --standalone \
              --enable-plugins=pyqt6 \
              --include-qt-plugins=qml,platforms,imageformats,iconengines \
              --follow-imports \
              --nofollow-import-to=tkinter,matplotlib,pandas,scipy,pytest,doctest \
              --nofollow-import-to=tests \
              --include-data-dir=gui/styles=gui/styles \
              --output-dir=dist \
              --output-filename=niuma-linux-arm64 \
              --assume-yes-for-downloads \
              --jobs=$(nproc) \
              --file-reference-choice=runtime \
              --include-package-data=PyQt6 \
              --linux-icon=icons/app.png \
              main.py
            
            echo "=== 验证并打包构建产物 ==="
            ls -la dist/
            if [ -d "dist/main.dist" ]; then
              mv dist/main.dist dist/niuma-linux-arm64
              cd dist
              tar -I "gzip -9" -cvf niuma-linux-arm64.tar.gz -C niuma-linux-arm64 .
              chown -R 1001:1001 /workspace/dist
              chmod -R 755 /workspace/dist
            else
              echo "构建失败: 输出目录未找到"
              exit 1
            fi
          '
      shell: bash

    - name: '5. 上传构建产物'
      uses: actions/upload-artifact@v7
      with:
        name: niuma-linux-arm64
        path: dist/niuma-linux-arm64.tar.gz
        retention-days: 30
        if-no-files-found: error
