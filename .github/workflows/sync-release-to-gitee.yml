name: 同步 Release 和资产到 Gitee

on:
  workflow_run:
    workflows: ["Build and Release"]
    types: [completed]
    branches: [main, master]

jobs:
  sync-release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 获取最新 Release 信息
        id: get-release
        run: |
          RELEASE_INFO=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest")
          
          echo "tag_name=$(echo $RELEASE_INFO | jq -r '.tag_name')" >> $GITHUB_ENV
          echo "name=$(echo $RELEASE_INFO | jq -r '.name')" >> $GITHUB_ENV
          echo "body=$(echo $RELEASE_INFO | jq -r '.body')" >> $GITHUB_ENV
          echo "target_commitish=$(echo $RELEASE_INFO | jq -r '.target_commitish')" >> $GITHUB_ENV
          echo "prerelease=$(echo $RELEASE_INFO | jq -r '.prerelease')" >> $GITHUB_ENV
          echo "upload_url=$(echo $RELEASE_INFO | jq -r '.upload_url')" >> $GITHUB_ENV
          
          echo "Release 标签: $tag_name"

      - name: 设置 Gitee 变量
        run: |
          echo "GITEE_OWNER=小马" >> $GITHUB_ENV     # 替换为你的 Gitee 用户名或组织名
          echo "GITEE_REPO=${{ github.event.repository.name }}" >> $GITHUB_ENV
          echo "GITEE_TOKEN=${{ secrets.GITEE_TOKEN }}" >> $GITHUB_ENV

      - name: 在 Gitee 创建 Release
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GITEE_TOKEN" \
            -d '{
              "tag_name": "'"$tag_name"'",
              "name": "'"$name"'",
              "body": "'"$body"'",
              "target_commitish": "'"$target_commitish"'",
              "prerelease": '"$prerelease"'
            }' \
            "https://gitee.com/api/v5/repos/$GITEE_OWNER/$GITEE_REPO/releases"

      - name: 下载并上传资产
        run: |
          # 解析 upload_url 提取基础 URL（移除 {?name,label}）
          UPLOAD_URL="${upload_url%%\{*}"
          echo "从以下地址下载资产: $UPLOAD_URL"

          # 从 GitHub 获取资产列表
          ASSETS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "$UPLOAD_URL" | jq -r '. | .browser_download_url')
          
          if [ -z "$ASSETS" ]; then
            echo "⚠️ 在 GitHub release 中未找到资产。"
          else
            echo "找到 $(echo "$ASSETS" | wc -l) 个资产需要同步..."

            for asset_url in $ASSETS; do
              echo "⬇️ 正在下载: $asset_url"
              asset_name=$(basename "$asset_url")
              curl -s -L "$asset_url" -o "/tmp/$asset_name"

              if [ ! -f "/tmp/$asset_name" ]; then
                echo "❌ 下载失败: $asset_url"
                continue
              fi

              echo "⬆️ 正在上传资产到 Gitee: $asset_name"
              curl -X POST \
                -H "Authorization: Bearer $GITEE_TOKEN" \
                -F "file=@/tmp/$asset_name" \
                "https://gitee.com/api/v5/repos/$GITEE_OWNER/$GITEE_REPO/releases/latest/assets?name=$asset_name"

              rm -f "/tmp/$asset_name"
            done
          fi

      - name: 成功消息
        run: |
          echo "🎉 成功将 release '$tag_name' 和所有资产同步到 Gitee！"