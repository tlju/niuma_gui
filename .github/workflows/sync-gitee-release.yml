name: Sync Release Assets to Gitee

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to sync (e.g. v1.2.3)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  upload-to-gitee:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq curl

      - name: Validate GITEE_TOKEN
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          set -euo pipefail
          API="https://gitee.com/api/v5"
          TFILE=$(mktemp)
          HTTP_CODE=$(curl -s -o "$TFILE" -w "%{http_code}" "$API/user?access_token=$GITEE_TOKEN")
          BODY=$(cat "$TFILE"); rm -f "$TFILE"
          echo "Gitee token validation HTTP code: $HTTP_CODE"
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Gitee token appears invalid or lacks permission. Response:"
            echo "$BODY"
            exit 1
          fi
          GLOGIN=$(echo "$BODY" | jq -r '.login // empty')
          GNAME=$(echo "$BODY" | jq -r '.name // empty')
          echo "Gitee token valid for user: ${GLOGIN} ${GNAME}"

      - name: Download release assets from GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -euo pipefail
          mkdir -p assets
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          TAG="${TAG}"

          echo "Fetching release info for $OWNER/$REPO tag $TAG from GitHub"
          TFILE=$(mktemp)
          HTTP_CODE=$(curl -s -o "$TFILE" -w "%{http_code}" -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/$OWNER/$REPO/releases/tags/$TAG")
          RELEASE_JSON=$(cat "$TFILE"); rm -f "$TFILE"
          echo "GitHub releases API HTTP code: $HTTP_CODE"
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Failed to fetch release info from GitHub. Response:"
            echo "$RELEASE_JSON"
            exit 1
          fi

          RELEASE_ID=$(echo "$RELEASE_JSON" | jq -r '.id // empty')
          if [ -z "$RELEASE_ID" ]; then
            echo "Release not found for tag $TAG"
            exit 1
          fi

          ASSET_COUNT=$(echo "$RELEASE_JSON" | jq '.assets | length')
          if [ "$ASSET_COUNT" -eq 0 ]; then
            echo "No assets to download"
            exit 0
          fi

          echo "Found $ASSET_COUNT asset(s). Downloading..."
          echo "$RELEASE_JSON" | jq -r '.assets[] | @base64' | while read -r asset; do
            _jq() { echo "$asset" | base64 --decode | jq -r "${1}"; }
            name=$(_jq '.name')
            url=$(_jq '.browser_download_url')
            echo "Downloading $name"
            curl -L -H "Authorization: token $GITHUB_TOKEN" -o "assets/$name" "$url"
            echo "Downloaded assets/$name"
          done

      - name: Create/Get Gitee release and upload assets
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: tlju
          GITEE_REPO: niuma_gui
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          API="https://gitee.com/api/v5"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          TAG="${RELEASE_TAG}"

          echo "Checking Gitee release for tag $RELEASE_TAG in $GITEE_OWNER/$GITEE_REPO"

          # Query release on Gitee
          TFILE=$(mktemp)
          HTTP_CODE=$(curl -s -o "$TFILE" -w "%{http_code}" "$API/repos/$GITEE_OWNER/$GITEE_REPO/releases/tags/$TAG?access_token=$GITEE_TOKEN")
          REL_JSON=$(cat "$TFILE"); rm -f "$TFILE"
          echo "Get release HTTP code: $HTTP_CODE"
          echo "Get release body: $REL_JSON"

          REL_ID=$(echo "$REL_JSON" | jq -r '.id // empty')

          # If not found on Gitee, prepare body & target_commitish from GitHub and create
          if [ -z "$REL_ID" ]; then
            echo "Gitee release not found — preparing to create one"

            # Get release info from GitHub to obtain body and target_commitish
            TFILE=$(mktemp)
            GH_CODE=$(curl -s -o "$TFILE" -w "%{http_code}" -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/$OWNER/$REPO/releases/tags/$TAG")
            GH_REL_JSON=$(cat "$TFILE"); rm -f "$TFILE"
            echo "GitHub release fetch HTTP code: $GH_CODE"
            if [ "$GH_CODE" -ne 200 ]; then
              echo "Failed to fetch release info from GitHub for creating Gitee release:"
              echo "$GH_REL_JSON"
              exit 1
            fi

            TARGET_COMMITISH=$(echo "$GH_REL_JSON" | jq -r '.target_commitish // empty')
            RELEASE_BODY=$(echo "$GH_REL_JSON" | jq -r '.body // empty')

            # If target_commitish empty, fallback to repo default branch
            if [ -z "$TARGET_COMMITISH" ]; then
              TFILE=$(mktemp)
              RB_CODE=$(curl -s -o "$TFILE" -w "%{http_code}" -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/$OWNER/$REPO")
              RB_JSON=$(cat "$TFILE"); rm -f "$TFILE"
              DEFAULT_BRANCH=$(echo "$RB_JSON" | jq -r '.default_branch // "main"')
              echo "Fallback default branch: $DEFAULT_BRANCH"
              TARGET_COMMITISH="$DEFAULT_BRANCH"
            fi

            echo "Creating Gitee release with tag $TAG, target_commitish=$TARGET_COMMITISH"

            TFILE=$(mktemp)
            # Use --data-urlencode for body to preserve newlines/special chars
            HTTP_CODE=$(curl -s -o "$TFILE" -w "%{http_code}" -X POST \
              "$API/repos/$GITEE_OWNER/$GITEE_REPO/releases?access_token=$GITEE_TOKEN" \
              -F "tag_name=$TAG" \
              -F "name=$TAG" \
              --data-urlencode "body=$RELEASE_BODY" \
              -F "target_commitish=$TARGET_COMMITISH")
            CREATE_BODY=$(cat "$TFILE"); rm -f "$TFILE"
            echo "Create release HTTP code: $HTTP_CODE"
            echo "Create release body: $CREATE_BODY"

            if [ "$HTTP_CODE" -ne 201 ] && [ "$HTTP_CODE" -ne 200 ]; then
              echo "Failed to create Gitee release (HTTP $HTTP_CODE). Response:"
              echo "$CREATE_BODY"
              exit 1
            fi

            REL_ID=$(echo "$CREATE_BODY" | jq -r '.id // empty')
            if [ -z "$REL_ID" ]; then
              echo "Create response did not contain release id; aborting"
              exit 1
            fi
          fi

          echo "Using Gitee release id: $REL_ID"

          # Upload](#)
