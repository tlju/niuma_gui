name: Sync Release Assets to Gitee

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to sync (e.g. v1.2.3)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  upload-to-gitee:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq curl

      - name: Validate GITEE_TOKEN
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          set -euo pipefail
          API="https://gitee.com/api/v5"
          TFILE=$(mktemp)
          HTTP_CODE=$(curl -s -o "$TFILE" -w "%{http_code}" "$API/user?access_token=$GITEE_TOKEN")
          BODY=$(cat "$TFILE"); rm -f "$TFILE"
          echo "Gitee token validation HTTP code: $HTTP_CODE"
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Gitee token appears invalid or lacks permission. Response:"
            echo "$BODY"
            exit 1
          fi
          GLOGIN=$(echo "$BODY" | jq -r '.login // empty')
          echo "Gitee token valid for user: ${GLOGIN}"

      - name: Download release assets from GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -euo pipefail
          mkdir -p assets
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          TAG="${TAG}"

          echo "Fetching release info for $OWNER/$REPO tag $TAG from GitHub"
          TFILE=$(mktemp)
          HTTP_CODE=$(curl -s -o "$TFILE" -w "%{http_code}" -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/$OWNER/$REPO/releases/tags/$TAG")
          RELEASE_JSON=$(cat "$TFILE"); rm -f "$TFILE"
          echo "GitHub releases API HTTP code: $HTTP_CODE"
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Failed to fetch release info from GitHub. Response:"
            echo "$RELEASE_JSON"
            exit 1
          fi

          RELEASE_ID=$(echo "$RELEASE_JSON" | jq -r '.id // empty')
          if [ -z "$RELEASE_ID" ]; then
            echo "Release not found for tag $TAG on GitHub"
            exit 1
          fi

          ASSET_COUNT=$(echo "$RELEASE_JSON" | jq '.assets | length')
          if [ "$ASSET_COUNT" -eq 0 ]; then
            echo "No assets to download"
            exit 0
          fi

          echo "Found $ASSET_COUNT asset(s). Downloading..."
          echo "$RELEASE_JSON" | jq -r '.assets[] | @base64' | while read -r asset; do
            _jq() { echo "$asset" | base64 --decode | jq -r "${1}"; }
            name=$(_jq '.name')
            url=$(_jq '.browser_download_url')
            echo "Downloading $name"
            curl -L -H "Authorization: token $GITHUB_TOKEN" -o "assets/$name" "$url"
            echo "Downloaded assets/$name"
          done

      - name: Ensure tag/release on Gitee and upload assets
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: tlju
          GITEE_REPO: niuma_gui
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          API="https://gitee.com/api/v5"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          TAG="${RELEASE_TAG}"

          echo "Checking whether tag $TAG exists on Gitee ($GITEE_OWNER/$GITEE_REPO)..."

          TFILE=$(mktemp)
          HTTP_CODE=$(curl -s -o "$TFILE" -w "%{http_code}" "$API/repos/$GITEE_OWNER/$GITEE_REPO/tags?per_page=100&access_token=$GITEE_TOKEN")
          TAGS_JSON=$(cat "$TFILE"); rm -f "$TFILE"
          echo "Gitee tags list HTTP code: $HTTP_CODE"
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Failed to fetch tags from Gitee. Response:"
            echo "$TAGS_JSON"
            exit 1
          fi

          TAG_EXISTS=$(echo "$TAGS_JSON" | jq -r --arg TAG "$TAG" 'map(.name) | index($TAG) // -1')
          if [ "$TAG_EXISTS" -ge 0 ]; then
            echo "Tag $TAG already exists on Gitee."
          else
            echo "Tag $TAG does not exist on Gitee — will attempt to create it (best-effort)."
            # get target_commitish and release body from GitHub
            TFILE=$(mktemp)
            GH_CODE=$(curl -s -o "$TFILE" -w "%{http_code}" -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/$OWNER/$REPO/releases/tags/$TAG")
            GH_REL_JSON=$(cat "$TFILE"); rm -f "$TFILE"
            if [ "$GH_CODE" -ne 200 ]; then
              echo "Failed to fetch GitHub release info for tag $TAG: $GH_REL_JSON"
              exit 1
            fi
            TARGET_COMMITISH=$(echo "$GH_REL_JSON" | jq -r '.target_commitish // empty')
            if [ -z "$TARGET_COMMITISH" ]; then
              TFILE=$(mktemp)
              RB_CODE=$(curl -s -o "$TFILE" -w "%{http_code}" -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/$OWNER/$REPO")
              RB_JSON=$(cat "$TFILE"); rm -f "$TFILE"
              TARGET_COMMITISH=$(echo "$RB_JSON" | jq -r '.default_branch // "main"')
              echo "No target_commitish in release; fallback to default branch: $TARGET_COMMITISH"
            fi

            # Try to resolve commit SHA for TARGET_COMMITISH
            TFILE=$(mktemp)
            C_CODE=$(curl -s -o "$TFILE" -w "%{http_code}" -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/$OWNER/$REPO/commits/$TARGET_COMMITISH")
            C_JSON=$(cat "$TFILE"); rm -f "$TFILE"
            if [ "$C_CODE" -ne 200 ]; then
              echo "Failed to resolve commit for $TARGET_COMMITISH on GitHub: $C_JSON"
              # continue; we can still try release creation (Gitee can create tag)
            else
              COMMIT_SHA=$(echo "$C_JSON" | jq -r '.sha // empty')
              if [ -n "${COMMIT_SHA:-}" ]; then
                echo "Resolved commit SHA for $TARGET_COMMITISH: $COMMIT_SHA"
                # Try to create tag ref on Gitee (best-effort)
                TFILE=$(mktemp)
                REF_CODE=$(curl -s -o "$TFILE" -w "%{http_code}" -X POST \
                  "$API/repos/$GITEE_OWNER/$GITEE_REPO/git/refs?access_token=$GITEE_TOKEN" \
                  -d "ref=refs/tags/$TAG" -d "sha=$COMMIT_SHA")
                REF_BODY=$(cat "$TFILE"); rm -f "$TFILE"
                echo "Create tag HTTP code: $REF_CODE"
                echo "Create tag body: $REF_BODY"
                if [ "$REF_CODE" -eq 201 ] || [ "$REF_CODE" -eq 200 ]; then
                  echo "Tag $TAG created on Gitee."
                else
                  echo "Creating tag via refs API failed or returned non-2xx; continuing to release creation (Gitee may create tag during release creation)."
                fi
              fi
            fi
          fi

          # Prepare release body and target_commitish for release creation
          # Fetch GitHub release info to get body/target_commitish (again, safe)
          TFILE=$(mktemp)
          GH_CODE=$(curl -s -o "$TFILE" -w "%{http_code}" -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/$OWNER/$REPO/releases/tags/$TAG")
          GH_REL_JSON=$(cat "$TFILE"); rm -f "$TFILE"
          if [ "$GH_CODE" -ne 200 ]; then
            echo "Failed to fetch GitHub release info for release creation: $GH_REL_JSON"
            exit 1
          fi
          TARGET_COMMITISH_FINAL=$(echo "$GH_REL_JSON" | jq -r '.target_commitish // empty')
          RELEASE_BODY=$(echo "$GH_REL_JSON" | jq -r '.body // empty')

          if [ -z "$TARGET_COMMITISH_FINAL" ]; then
            TFILE=$(mktemp)
            RB_CODE=$(curl -s -o "$TFILE" -w "%{http_code}" -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/$OWNER/$REPO")
            RB_JSON=$(cat "$TFILE"); rm -f "$TFILE"
            TARGET_COMMITISH_FINAL=$(echo "$RB_JSON" | jq -r '.default_branch // "main"')
          fi

          # Ensure release body non-empty
          if [ -z "${RELEASE_BODY}" ]; then
            RELEASE_BODY="Synchronized from GitHub release ${TAG}"
            echo "Release body was empty; using fallback message."
          fi

          echo "Creating or getting Gitee release for tag $TAG with target_commitish=$TARGET_COMMITISH_FINAL"

          TFILE=$(mktemp)
          HTTP_CODE=$(curl -s -o "$TFILE" -w "%{http_code}" "$API/repos/$GITEE_OWNER/$GITEE_REPO/releases/tags/$TAG?access_token=$GITEE_TOKEN")
          REL_JSON=$(cat "$TFILE"); rm -f "$TFILE"
          echo "Get release by tag HTTP code: $HTTP_CODE"
          echo "Get release by tag response: $REL_JSON"
          
          REL_ID=""
          if [ "$HTTP_CODE" -eq 200 ] && [ "$REL_JSON" != "null" ] && [ -n "$REL_JSON" ]; then
            REL_ID=$(echo "$REL_JSON" | jq -r '.id // empty' 2>/dev/null || echo "")
          else
            echo "Release not found for tag $TAG on Gitee, will create new release"
          fi

          if [ -z "$REL_ID" ]; then
            TFILE=$(mktemp)
            HTTP_CODE=$(curl -s -o "$TFILE" -w "%{http_code}" -X POST \
              "$API/repos/$GITEE_OWNER/$GITEE_REPO/releases?access_token=$GITEE_TOKEN" \
              -F "tag_name=$TAG" \
              -F "name=$TAG" \
              --data-urlencode "body=$RELEASE_BODY" \
              -F "target_commitish=$TARGET_COMMITISH_FINAL")
            CREATE_BODY=$(cat "$TFILE"); rm -f "$TFILE"
            echo "Create release HTTP code: $HTTP_CODE"
            echo "Create release body: $CREATE_BODY"

            if [ "$HTTP_CODE" -ne 201 ] && [ "$HTTP_CODE" -ne 200 ]; then
              echo "Failed to create Gitee release (HTTP $HTTP_CODE). Response:"
              echo "$CREATE_BODY"
              exit 1
            fi

            REL_ID=$(echo "$CREATE_BODY" | jq -r '.id // empty')
            if [ -z "$REL_ID" ]; then
              echo "Create response did not contain release id; aborting"
              exit 1
            fi
          else
            echo "Found existing Gitee release id: $REL_ID"
          fi

          echo "Using Gitee release id: $REL_ID"

          # Upload each asset with retries
          for f in assets/*; do
            [ -f "$f" ] || continue
            fname=$(basename "$f")
            echo "Uploading $fname ..."
            retries=0
            success=0
            while [ $retries -lt 3 ]; do
              TFILE=$(mktemp)
              HTTP_CODE=$(curl -s -o "$TFILE" -w "%{http_code}" -X POST \
                "$API/repos/$GITEE_OWNER/$GITEE_REPO/releases/$REL_ID/assets?access_token=$GITEE_TOKEN" \
                -F "attachment=@$f" \
                -F "name=$fname")
              UP_BODY=$(cat "$TFILE"); rm -f "$TFILE"
              echo "Upload HTTP code: $HTTP_CODE"
              echo "Upload response: $UP_BODY"
              if [ "$HTTP_CODE" -eq 201 ] || [ "$HTTP_CODE" -eq 200 ]; then
                echo "Uploaded $fname successfully"
                success=1
                break
              fi
              retries=$((retries+1))
              echo "Upload attempt $retries failed for $fname. Retrying in 5s..."
              sleep 5
            done
            if [ $success -ne 1 ]; then
              echo "Failed to upload $fname after $retries attempts"
              exit 1
            fi
          done

      - name: Done
        run: echo "Sync to Gitee complete"