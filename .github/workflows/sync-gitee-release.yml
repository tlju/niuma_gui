name: Sync Release Assets to Gitee

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to sync (e.g. v1.2.3)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  upload-to-gitee:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq curl

      - name: Validate GITEE_TOKEN
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          set -euo pipefail
          API="https://gitee.com/api/v5"
          TFILE=$(mktemp)
          HTTP_CODE=$(curl -s -o "$TFILE" -w "%{http_code}" "$API/user?access_token=$GITEE_TOKEN")
          BODY=$(cat "$TFILE"); rm -f "$TFILE"
          echo "Gitee token validation HTTP code: $HTTP_CODE"
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Gitee token appears invalid or lacks permission. Response:"
            echo "$BODY"
            exit 1
          fi
          # print limited user info
          GLOGIN=$(echo "$BODY" | jq -r '.login // empty')
          GNAME=$(echo "$BODY" | jq -r '.name // empty')
          echo "Gitee token valid for user: ${GLOGIN} ${GNAME}"

      - name: Download release assets from GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -euo pipefail
          mkdir -p assets
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          TAG="${TAG}"

          echo "Fetching release info for $OWNER/$REPO tag $TAG"
          TFILE=$(mktemp)
          HTTP_CODE=$(curl -s -o "$TFILE" -w "%{http_code}" -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/$OWNER/$REPO/releases/tags/$TAG")
          RELEASE_JSON=$(cat "$TFILE"); rm -f "$TFILE"
          echo "GitHub releases API HTTP code: $HTTP_CODE"
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Failed to fetch release info from GitHub. Response:"
            echo "$RELEASE_JSON"
            exit 1
          fi

          RELEASE_ID=$(echo "$RELEASE_JSON" | jq -r '.id // empty')
          if [ -z "$RELEASE_ID" ]; then
            echo "Release not found for tag $TAG"
            exit 1
          fi

          ASSET_COUNT=$(echo "$RELEASE_JSON" | jq '.assets | length')
          if [ "$ASSET_COUNT" -eq 0 ]; then
            echo "No assets to download"
            exit 0
          fi

          echo "Found $ASSET_COUNT asset(s). Downloading..."
          echo "$RELEASE_JSON" | jq -r '.assets[] | @base64' | while read -r asset; do
            _jq() { echo "$asset" | base64 --decode | jq -r "${1}"; }
            name=$(_jq '.name')
            url=$(_jq '.browser_download_url')
            echo "Downloading $name"
            # Use Authorization header so private repos work; follow redirects
            curl -L -H "Authorization: token $GITHUB_TOKEN" -o "assets/$name" "$url"
            echo "Downloaded assets/$name"
          done

      - name: Create/Get Gitee release and upload assets
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: tlju
          GITEE_REPO: niuma_gui
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -euo pipefail
          API="https://gitee.com/api/v5"
          echo "Checking Gitee release for tag $RELEASE_TAG in $GITEE_OWNER/$GITEE_REPO"

          # Query release (using access_token parameter)
          TFILE=$(mktemp)
          HTTP_CODE=$(curl -s -o "$TFILE" -w "%{http_code}" "$API/repos/$GITEE_OWNER/$GITEE_REPO/releases/tags/$RELEASE_TAG?access_token=$GITEE_TOKEN")
          REL_JSON=$(cat "$TFILE"); rm -f "$TFILE"
          echo "Get release HTTP code: $HTTP_CODE"
          echo "Get release body: $REL_JSON"

          REL_ID=$(echo "$REL_JSON" | jq -r '.id // empty')

          if [ -z "$REL_ID" ]; then
            echo "Gitee release not found — creating one"
            TFILE=$(mktemp)
            HTTP_CODE=$(curl -s -o "$TFILE" -w "%{http_code}" -X POST \
              "$API/repos/$GITEE_OWNER/$GITEE_REPO/releases?access_token=$GITEE_TOKEN" \
              -d "tag_name=$RELEASE_TAG" -d "name=$RELEASE_TAG")
            CREATE_BODY=$(cat "$TFILE"); rm -f "$TFILE"
            echo "Create release HTTP code: $HTTP_CODE"
            echo "Create release body: $CREATE_BODY"

            if [ "$HTTP_CODE" -ne 201 ] && [ "$HTTP_CODE" -ne 200 ]; then
              echo "Failed to create Gitee release (HTTP $HTTP_CODE). Response:"
              echo "$CREATE_BODY"
              exit 1
            fi

            REL_ID=$(echo "$CREATE_BODY" | jq -r '.id // empty')
            if [ -z "$REL_ID" ]; then
              echo "Create response did not contain release id; aborting"
              exit 1
            fi
          fi

          echo "Using Gitee release id: $REL_ID"

          # Upload each asset with retries
          for f in assets/*; do
            [ -f "$f" ] || continue
            fname=$(basename "$f")
            echo "Uploading $fname ..."
            retries=0
            success=0
            while [ $retries -lt 3 ]; do
              TFILE=$(mktemp)
              HTTP_CODE=$(curl -s -o "$TFILE" -w "%{http_code}" -X POST \
                "$API/repos/$GITEE_OWNER/$GITEE_REPO/releases/$REL_ID/assets?access_token=$GITEE_TOKEN" \
                -F "attachment=@$f" \
                -F "name=$fname")
              UP_BODY=$(cat "$TFILE"); rm -f "$TFILE"
              echo "Upload HTTP code: $HTTP_CODE"
              echo "Upload response: $UP_BODY"
              if [ "$HTTP_CODE" -eq 201 ] || [ "$HTTP_CODE" -eq 200 ]; then
                echo "Uploaded $fname successfully"
                success=1
                break
              fi
              retries=$((retries+1))
              echo "Upload attempt $retries failed for $fname. Retrying in 5s..."
              sleep 5
            done
            if [ $success -ne 1 ]; then
              echo "Failed to upload $fname after $retries attempts"
              exit 1
            fi
          done

      - name: Done
        run: echo "Sync to Gitee complete"