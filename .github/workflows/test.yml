name: 测试

on:
  push:
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.11'
  CACHE_VERSION: v1

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            platform: windows
            arch: x64
          - os: ubuntu-22.04
            platform: linux
            arch: x64
            platform_name: linux/amd64
          - os: ubuntu-22.04
            platform: linux
            arch: arm64
            platform_name: linux/arm64

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 QEMU (arm64)
      if: matrix.arch == 'arm64'
      uses: docker/setup-qemu-action@v3

    - name: 恢复 Docker 镜像缓存 (Linux)
      if: matrix.platform == 'linux'
      uses: actions/cache@v4
      id: cache-docker-image
      with:
        path: docker-image-${{ matrix.arch }}.tar
        key: ${{ env.CACHE_VERSION }}-docker-image-${{ matrix.arch }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ env.CACHE_VERSION }}-docker-image-${{ matrix.arch }}-${{ env.PYTHON_VERSION }}-
          ${{ env.CACHE_VERSION }}-docker-image-${{ matrix.arch }}-

    - name: 创建 Docker 镜像 (Linux)
      if: matrix.platform == 'linux' && steps.cache-docker-image.outputs.cache-hit != 'true'
      run: |
        CONTAINER_ID=$(docker run -d \
          --platform ${{ matrix.platform_name }} \
          debian:10.10 \
          tail -f /dev/null)

        docker exec $CONTAINER_ID bash -c '
          set -e

          echo "=== 配置 apt 源 (Debian 10 已归档) ==="
          echo "deb http://archive.debian.org/debian buster main" > /etc/apt/sources.list
          echo "deb http://archive.debian.org/debian buster-updates main" >> /etc/apt/sources.list
          echo "Acquire::Check-Valid-Until false;" > /etc/apt/apt.conf.d/99no-check-valid-until

          echo "=== 安装系统依赖 ==="
          apt-get update
          apt-get install -y \
            gcc g++ make wget \
            qt5-default qtbase5-dev qtchooser qttools5-dev-tools \
            libqt5gui5 libqt5core5a libqt5dbus5 \
            libxrender-dev libxext-dev libx11-dev libx11-xcb-dev \
            libxcb1-dev libxkbcommon-dev \
            libxcb-* \
            libgl1-mesa-dev libegl1-mesa-dev \
            libxkbcommon-x11-dev \
            libssl-dev \
            bzip2 libbz2-dev \
            libffi-dev \
            zlib1g-dev \
            liblzma-dev \
            libsqlite3-dev \
            libreadline-dev \
            tk-dev \
            libgdbm-dev \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1

          echo "=== 编译 Python ${{ env.PYTHON_VERSION }} ==="
          cd /tmp
          wget -q https://www.python.org/ftp/python/3.11.15/Python-3.11.15.tgz
          tar xzf Python-3.11.15.tgz
          cd Python-3.11.15

          ./configure \
            --enable-optimizations \
            --enable-shared \
            --prefix=/usr/local/python3.11 \
            LDFLAGS="-Wl,-rpath,/usr/local/python3.11/lib"

          make -j$(nproc)
          make install

          echo "/usr/local/python3.11/lib" > /etc/ld.so.conf.d/python3.11.conf
          ldconfig

          ln -sf /usr/local/python3.11/bin/python3.11 /usr/local/bin/python3
          ln -sf /usr/local/python3.11/bin/pip3.11 /usr/local/bin/pip3

          echo "=== 安装 Python 包管理工具 ==="
          python3 -m pip install --upgrade pip setuptools wheel

          echo "=== 安装 PyQt5 ==="
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            echo "=== ARM64: 编译安装 PyQt5 ==="
            pip3 install --no-binary=:all: sip
            pip3 install --no-binary=:all: PyQt5-sip
            pip3 install PyQt-builder
            pip3 install pyqt5 --config-settings --confirm-license= --verbose
          else
            echo "=== x64: 安装预编译版本 ==="
            pip3 install --only-binary=:all: PyQt5 PyQt5-Qt5 PyQt5-sip
          fi

          echo "=== 清理临时文件 ==="
          cd /
          rm -rf /tmp/Python-3.11.15*
          apt-get clean
          rm -rf /var/lib/apt/lists/*
        '

        echo "=== 安装项目依赖 ==="
        docker cp requirements.txt $CONTAINER_ID:/tmp/requirements.txt
        docker exec $CONTAINER_ID pip3 install -r /tmp/requirements.txt
        docker exec $CONTAINER_ID pip3 install pytest pytest-cov

        echo "=== 提交容器为镜像 ==="
        docker commit $CONTAINER_ID niuma-build-${{ matrix.arch }}:latest
        docker save -o docker-image-${{ matrix.arch }}.tar niuma-build-${{ matrix.arch }}:latest
        docker rm -f $CONTAINER_ID
      shell: bash

    - name: 保存 Docker 镜像缓存 (Linux)
      if: matrix.platform == 'linux' && steps.cache-docker-image.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: docker-image-${{ matrix.arch }}.tar
        key: ${{ env.CACHE_VERSION }}-docker-image-${{ matrix.arch }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}

    - name: 设置 Python (Windows)
      if: matrix.platform == 'windows'
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: 安装依赖 (Windows)
      if: matrix.platform == 'windows'
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install pytest pytest-cov
      shell: powershell

    - name: 运行单元测试 (Windows)
      if: matrix.platform == 'windows'
      run: |
        pytest tests/ -v --tb=short --cov=core --cov=schemas --cov=services --cov=models --cov-report=term-missing
      env:
        PYTHONPATH: .
      shell: powershell

    - name: 运行单元测试 (Linux)
      if: matrix.platform == 'linux'
      run: |
        echo "=== 加载 Docker 镜像 ==="
        docker load -i docker-image-${{ matrix.arch }}.tar

        CONTAINER_ID=$(docker run -d \
          --platform ${{ matrix.platform_name }} \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          niuma-build-${{ matrix.arch }}:latest \
          tail -f /dev/null)

        docker exec $CONTAINER_ID bash -c '
          set -e

          echo "=== 验证环境 ==="
          python3 --version
          pip3 --version

          echo "=== 安装测试依赖 ==="
          python3 -m pip install pytest pytest-cov

          echo "=== 运行单元测试 ==="
          cd /workspace
          python3 -m pytest tests/ -v --tb=short --cov=core --cov=schemas --cov=services --cov=models --cov-report=term-missing
        '

        echo "=== 清理容器 ==="
        docker rm -f $CONTAINER_ID
      shell: bash
