name: 构建和发布

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.10'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x64
            platform: linux
            output_name: niuma-linux-x64
          - os: ubuntu-22.04
            arch: arm64
            platform: linux
            output_name: niuma-linux-arm64
          - os: windows-2022
            arch: x64
            platform: windows
            output_name: niuma-windows-x64

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 QEMU (arm64)
      if: matrix.arch == 'arm64'
      uses: docker/setup-qemu-action@v3

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt
          .github/workflows/build.yml

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install nuitka ordered-set zstandard

    - name: 安装构建依赖 (Linux)
      if: matrix.platform == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache build-essential \
          libegl1 libgl1-mesa-glx libxkbcommon-x11-0 \
          libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
          libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
          libxcb-cursor0

    - name: 安装构建依赖 (Windows)
      if: matrix.platform == 'windows'
      run: |
        choco install ccache -y

    - name: 验证 Python 环境
      run: |
        python --version
        pip --version
        pip list | grep -i nuitka
        ccache --version || echo "ccache not available"

    - name: 使用 Nuitka 构建
      run: |
        if [ "${{ matrix.platform }}" = "windows" ]; then
          python -m nuitka --standalone \
            --enable-plugins=pyqt6 \
            --include-qt-plugins=qml \
            --follow-imports \
            --nofollow-import-to=tkinter,matplotlib,pandas,scipy,pytest,doctest \
            --nofollow-import-to=tests \
            --include-data-dir=gui/styles=gui/styles \
            --include-data-file=icons/app.ico=icons/app.ico \
            --windows-console-mode=disable \
            --output-dir=dist \
            --output-filename=${{ matrix.output_name }} \
            --assume-yes-for-downloads \
            --jobs=$(nproc) \
            --include-package-data=PyQt6 \
            --windows-icon-from-ico=icons/app.ico \
            main.py
        else
          python -m nuitka --standalone \
            --enable-plugins=pyqt6 \
            --include-qt-plugins=qml \
            --follow-imports \
            --nofollow-import-to=tkinter,matplotlib,pandas,scipy,pytest,doctest \
            --nofollow-import-to=tests \
            --include-data-dir=gui/styles=gui/styles \
            --output-dir=dist \
            --output-filename=${{ matrix.output_name }} \
            --assume-yes-for-downloads \
            --jobs=$(nproc) \
            --file-reference-choice=runtime \
            --include-package-data=PyQt6 \
            --linux-icon=icons/app.png \
            main.py
        fi
      shell: bash

    - name: 验证构建输出
      run: |
        echo "检查 dist 目录内容:"
        ls -la dist/
        if [ -d "dist/main.dist" ]; then
          echo "构建成功: main.dist"
          ls -la dist/main.dist
          mv dist/main.dist dist/${{ matrix.output_name }}
          echo "重命名为: ${{ matrix.output_name }}"
        else
          echo "构建失败: 输出目录未找到"
          exit 1
        fi
      shell: bash

    - name: 压缩构建产物
      run: |
        cd dist
        if [ "${{ matrix.platform }}" = "windows" ]; then
          7z a -t7z -mx=9 -m0=lzma2 -mfb=64 -md=32m -ms=on ${{ matrix.output_name }}.7z ${{ matrix.output_name }}
        else
          tar -I "gzip -9" -cvf ${{ matrix.output_name }}.tar.gz ${{ matrix.output_name }}
        fi
        ls -lh ${{ matrix.output_name }}.*
      shell: bash

    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.output_name }}
        path: |
          dist/${{ matrix.output_name }}.tar.gz
          dist/${{ matrix.output_name }}.7z
        retention-days: 30

    - name: 上传到发布
      if: github.event_name == 'release' && github.event.release.tag_name != ''
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.release.tag_name }}
        files: |
          dist/${{ matrix.output_name }}.tar.gz
          dist/${{ matrix.output_name }}.7z
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
