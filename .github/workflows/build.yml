name: 构建和发布

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.12'
  CACHE_VERSION: v2

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x64
            platform: linux
            platform_name: linux/amd64
            output_name: niuma-linux-x64
            python_cache_name: python-env-linux-x64
          - os: ubuntu-22.04
            arch: arm64
            platform: linux
            platform_name: linux/arm64
            output_name: niuma-linux-arm64
            python_cache_name: python-env-linux-arm64
          - os: windows-2022
            arch: x64
            platform: windows
            output_name: niuma-windows-x64
            python_cache_name: python-env-windows-x64

    steps:
    - name: '1. 检出代码'
      uses: actions/checkout@v6

    - name: '2. 设置 QEMU (arm64)'
      if: matrix.arch == 'arm64'
      uses: docker/setup-qemu-action@v4

    - name: '3. 恢复 Python 环境缓存 (Windows)'
      if: matrix.platform == 'windows'
      uses: actions/cache@v5
      id: cache-python-windows
      with:
        path: python-env-${{ matrix.arch }}.7z
        key: ${{ env.CACHE_VERSION }}-${{ matrix.python_cache_name }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ env.CACHE_VERSION }}-${{ matrix.python_cache_name }}-${{ env.PYTHON_VERSION }}-
          ${{ env.CACHE_VERSION }}-${{ matrix.python_cache_name }}-

    - name: '4. 设置 Python (Windows)'
      if: matrix.platform == 'windows' && steps.cache-python-windows.outputs.cache-hit != 'true'
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: '5. 安装依赖 (Windows)'
      if: matrix.platform == 'windows' && steps.cache-python-windows.outputs.cache-hit != 'true'
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install nuitka ordered-set zstandard
      shell: powershell

    - name: '6. 安装构建依赖 (Windows)'
      if: matrix.platform == 'windows' && steps.cache-python-windows.outputs.cache-hit != 'true'
      run: choco install ccache -y

    - name: '7. 打包 Python 环境 (Windows)'
      if: matrix.platform == 'windows' && steps.cache-python-windows.outputs.cache-hit != 'true'
      run: |
        $pythonPath = python -c "import sys; print(sys.prefix)"
        7z a -t7z -mx=9 python-env-${{ matrix.arch }}.7z "$pythonPath\*"
      shell: powershell

    - name: '8. 恢复 Python 环境 (Windows)'
      if: matrix.platform == 'windows' && steps.cache-python-windows.outputs.cache-hit == 'true'
      run: |
        $destPath = "$env:LOCALAPPDATA\python-cache"
        New-Item -ItemType Directory -Force -Path $destPath
        7z x python-env-${{ matrix.arch }}.7z -o"$destPath" -y
        Add-Content -Path $env:GITHUB_PATH -Value "$destPath\Scripts"
        Add-Content -Path $env:GITHUB_PATH -Value "$destPath"
      shell: powershell

    - name: '9. 恢复 Docker 镜像缓存 (Linux)'
      if: matrix.platform == 'linux'
      uses: actions/cache@v5
      id: cache-docker-image
      with:
        path: docker-image-${{ matrix.arch }}.tar
        key: ${{ env.CACHE_VERSION }}-docker-image-${{ matrix.arch }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ env.CACHE_VERSION }}-docker-image-${{ matrix.arch }}-${{ env.PYTHON_VERSION }}-
          ${{ env.CACHE_VERSION }}-docker-image-${{ matrix.arch }}-

    - name: '10. 创建基础 Docker 镜像 (Linux)'
      if: matrix.platform == 'linux' && steps.cache-docker-image.outputs.cache-hit != 'true'
      run: |
        CONTAINER_ID=$(docker run -d \
          --platform ${{ matrix.platform_name }} \
          debian:10.10 \
          tail -f /dev/null)
        
        docker exec $CONTAINER_ID bash -c '
          set -e
          
          echo "=== 配置 apt 源 (Debian 10 已归档) ==="
          echo "deb http://archive.debian.org/debian buster main" > /etc/apt/sources.list
          echo "deb http://archive.debian.org/debian buster-updates main" >> /etc/apt/sources.list
          echo "Acquire::Check-Valid-Until false;" > /etc/apt/apt.conf.d/99no-check-valid-until
          
          echo "=== 安装系统依赖 ==="
          apt-get update
          apt-get install -y \
            gcc g++ clang make wget patchelf ccache \
            libxrender-dev libxext-dev libx11-dev \
            libxcb1-dev libxkbcommon-dev \
            libxcb-* \
            libgl1-mesa-dev libegl1-mesa-dev \
            libxkbcommon-x11-dev \
            libssl-dev \
            bzip2 libbz2-dev \
            libffi-dev \
            zlib1g-dev \
            liblzma-dev \
            libsqlite3-dev \
            libreadline-dev \
            tk-dev \
            libgdbm-dev \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1
          
          echo "=== 编译 Python 3.12 (架构优化) ==="
          cd /tmp
          wget -q https://www.python.org/ftp/python/3.12.13/Python-3.12.13.tgz
          tar xzf Python-3.12.13.tgz
          cd Python-3.12.13
          
          ARCH_FLAGS=""
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            ARCH_FLAGS="--with-arch=armv8-a --with-fpu=crypto"
          elif [ "${{ matrix.arch }}" = "x64" ]; then
            ARCH_FLAGS="--with-arch=x86-64-v3 --enable-optimizations"
          fi
          
          ./configure \
            --enable-optimizations \
            --prefix=/usr/local/python3.12 \
            $ARCH_FLAGS
          
          make -j$(nproc)
          make install
          
          echo "=== 安装 Python 包管理工具 ==="
          /usr/local/python3.12/bin/python3.12 -m pip install --upgrade pip setuptools wheel
          
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            echo "=== 安装 Qt5 预编译包 (arm64) ==="
            apt-get install -y \
              qtbase5-dev qt5-qmake qtchooser \
              qtbase5-dev-tools qtbase5-private-dev \
              libqt5svg5-dev libqt5opengl5-dev \
              libqt5xml5 libqt5xmlpatterns5-dev \
              libqt5dbus5 libqt5network5 \
              qt5-default 2>/dev/null || true
            
            echo "=== 配置 qmake 路径 ==="
            QMAKE_PATH=$(which qmake 2>/dev/null || echo "/usr/lib/qt5/bin/qmake")
            echo "qmake 路径: $QMAKE_PATH"
            $QMAKE_PATH -query
            
            echo "=== 安装 PyQt5 构建依赖 ==="
            /usr/local/python3.12/bin/pip3.12 install sip PyQt5-sip PyQt-builder
            
            echo "=== 从源码构建安装 PyQt5 (arm64, 使用系统 Qt5) ==="
            /usr/local/python3.12/bin/pip3.12 install \
              --no-binary=PyQt5 \
              --config-settings=--confirm-license \
              --config-settings=QMAKE_QT5_PATH="$QMAKE_PATH" \
              PyQt5
          else
            echo "=== 安装 PyQt5 (预编译版本) ==="
            /usr/local/python3.12/bin/pip3.12 install --only-binary=:all: PyQt5 PyQt5-Qt5 PyQt5-sip
          fi
          
          echo "=== 创建符号链接 ==="
          ln -sf /usr/local/python3.12/bin/python3.12 /usr/local/bin/python3
          ln -sf /usr/local/python3.12/bin/pip3.12 /usr/local/bin/pip3
          
          echo "=== 清理临时文件 ==="
          cd /
          rm -rf /tmp/Python-3.12.13*
          apt-get clean
          rm -rf /var/lib/apt/lists/*
        '
        
        echo "=== 提交容器为镜像 ==="
        docker commit $CONTAINER_ID niuma-build-${{ matrix.arch }}:latest
        
        echo "=== 导出镜像为 tar 文件 ==="
        docker save -o docker-image-${{ matrix.arch }}.tar niuma-build-${{ matrix.arch }}:latest
        
        echo "=== 清理容器 ==="
        docker rm -f $CONTAINER_ID
      shell: bash

    - name: '10.5. 保存 Docker 镜像缓存 (Linux)'
      if: matrix.platform == 'linux' && steps.cache-docker-image.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: docker-image-${{ matrix.arch }}.tar
        key: ${{ env.CACHE_VERSION }}-docker-image-${{ matrix.arch }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}

    - name: '11. 加载 Docker 镜像并安装项目依赖 (Linux)'
      if: matrix.platform == 'linux'
      run: |
        if [ "${{ steps.cache-docker-image.outputs.cache-hit }}" = "true" ]; then
          echo "=== 从缓存加载 Docker 镜像 ==="
          docker load -i docker-image-${{ matrix.arch }}.tar
        fi
        
        CONTAINER_ID=$(docker run -d \
          --platform ${{ matrix.platform_name }} \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          niuma-build-${{ matrix.arch }}:latest \
          tail -f /dev/null)
        
        docker exec $CONTAINER_ID bash -c '
          set -e
          
          echo "=== 验证 Python 环境 ==="
          python3 --version
          pip3 --version
          
          echo "=== 安装项目依赖 ==="
          pip3 install -r requirements.txt
          pip3 install nuitka ordered-set zstandard
          
          echo "=== 验证 PyQt5 安装 ==="
          python3 -c "from PyQt5.QtCore import PYQT_VERSION_STR; print(\"PyQt5 version:\", PYQT_VERSION_STR)"
        '
        
        echo "=== 更新镜像 (包含项目依赖) ==="
        docker commit $CONTAINER_ID niuma-build-${{ matrix.arch }}:latest
        
        echo "=== 导出更新后的镜像 ==="
        docker save -o docker-image-${{ matrix.arch }}.tar niuma-build-${{ matrix.arch }}:latest
        
        echo "=== 清理容器 ==="
        docker rm -f $CONTAINER_ID
      shell: bash

    - name: '12. 使用 Nuitka 构建 (Linux)'
      if: matrix.platform == 'linux'
      run: |
        echo "=== 加载 Docker 镜像 ==="
        docker load -i docker-image-${{ matrix.arch }}.tar
        
        CONTAINER_ID=$(docker run -d \
          --platform ${{ matrix.platform_name }} \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          niuma-build-${{ matrix.arch }}:latest \
          tail -f /dev/null)
        
        docker exec $CONTAINER_ID bash -c '
          set -e
          
          echo "=== 验证环境 ==="
          python3 --version
          pip3 --version
          
          echo "=== 使用 Nuitka 构建 (架构优化) ==="
          cd /workspace
          
          OPT_FLAGS=""
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            OPT_FLAGS="--clang --lto=yes"
          elif [ "${{ matrix.arch }}" = "x64" ]; then
            OPT_FLAGS="--clang --lto=yes"
          fi
          
          python3 -m nuitka --standalone \
            --enable-plugins=pyqt5 \
            --include-qt-plugins=platforms,imageformats,iconengines \
            --follow-imports \
            --nofollow-import-to=tkinter,matplotlib,pandas,scipy,pytest,doctest \
            --nofollow-import-to=tests \
            --nofollow-import-to=PyQt5.QtQuick,PyQt5.QtQuick3D,PyQt5.QtQml,PyQt5.QtQuickWidgets \
            --include-data-dir=gui/styles=gui/styles \
            --output-dir=dist \
            --output-filename=${{ matrix.output_name }} \
            --assume-yes-for-downloads \
            --jobs=$(nproc) \
            --file-reference-choice=runtime \
            --linux-icon=icons/app.png \
            $OPT_FLAGS \
            main.py
        '
        
        echo "=== 清理容器 ==="
        docker rm -f $CONTAINER_ID
      shell: bash

    - name: '13. 验证并打包构建产物 (Linux)'
      if: matrix.platform == 'linux'
      run: |
        echo "=== 加载 Docker 镜像 ==="
        docker load -i docker-image-${{ matrix.arch }}.tar
        
        CONTAINER_ID=$(docker run -d \
          --platform ${{ matrix.platform_name }} \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          niuma-build-${{ matrix.arch }}:latest \
          tail -f /dev/null)
        
        docker exec $CONTAINER_ID bash -c '
          set -e
          
          echo "=== 验证并打包构建产物 ==="
          ls -la dist/
          if [ -d "dist/main.dist" ]; then
            mv dist/main.dist dist/${{ matrix.output_name }}
            cd dist
            tar -I "gzip -9" -cvf ${{ matrix.output_name }}.tar.gz -C ${{ matrix.output_name }} .
            chown -R 1001:1001 /workspace/dist
            chmod -R 755 /workspace/dist
          else
            echo "构建失败: 输出目录未找到"
            exit 1
          fi
        '
        
        echo "=== 清理容器 ==="
        docker rm -f $CONTAINER_ID
      shell: bash

    - name: '14. 使用 Nuitka 构建 (Windows)'
      if: matrix.platform == 'windows'
      run: |
        $jobs = [Environment]::ProcessorCount
        python -m nuitka --standalone `
          --enable-plugins=pyqt5 `
          --include-qt-plugins=platforms,imageformats,iconengines `
          --follow-imports `
          --nofollow-import-to=tkinter,matplotlib,pandas,scipy,pytest,doctest `
          --nofollow-import-to=tests `
          --nofollow-import-to=PyQt5.QtQuick,PyQt5.QtQuick3D,PyQt5.QtQml,PyQt5.QtQuickWidgets `
          --include-data-dir=gui/styles=gui/styles `
          --include-data-file=icons/app.ico=icons/app.ico `
          --windows-console-mode=disable `
          --output-dir=dist `
          --output-filename=${{ matrix.output_name }} `
          --assume-yes-for-downloads `
          --jobs=$jobs `
          --windows-icon-from-ico=icons/app.ico `
          main.py
      shell: powershell

    - name: '15. 验证并打包构建产物 (Windows)'
      if: matrix.platform == 'windows'
      run: |
        if (Test-Path "dist\main.dist") {
          Rename-Item "dist\main.dist" "${{ matrix.output_name }}"
          cd dist
          7z a -t7z -mx=9 -m0=lzma2 -mfb=64 -md=32m -ms=on ${{ matrix.output_name }}.7z ${{ matrix.output_name }}\*
        } else {
          Write-Host "构建失败: 输出目录未找到"
          exit 1
        }
      shell: powershell

    - name: '16. 上传构建产物'
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.output_name }}
        path: |
          dist/${{ matrix.output_name }}.tar.gz
          dist/${{ matrix.output_name }}.7z
        retention-days: 30
        if-no-files-found: ignore

    - name: '17. 上传到发布'
      if: github.event_name == 'release' && github.event.release.tag_name != ''
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ github.event.release.tag_name }}
        files: |
          dist/${{ matrix.output_name }}.tar.gz
          dist/${{ matrix.output_name }}.7z
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: '18. 上传到 Gitee Release (Linux)'
      if: matrix.platform == 'linux' && github.event_name == 'release' && github.event.release.tag_name != ''
      uses: nicennnnnnnlee/action-gitee-release@v2.0.0
      with:
        gitee_action: upload_asset
        gitee_owner: ${{ secrets.GITEE_USER }}
        gitee_repo: niuma_gui
        gitee_token: ${{ secrets.GITEE_TOKEN }}
        gitee_tag_name: ${{ github.event.release.tag_name }}
        gitee_upload_retry_times: 3
        gitee_files: |
          docker-image-${{ matrix.arch }}.tar
          dist/${{ matrix.output_name }}.tar.gz

    - name: '18. 上传到 Gitee Release (Windows)'
      if: matrix.platform == 'windows' && github.event_name == 'release' && github.event.release.tag_name != ''
      uses: nicennnnnnnlee/action-gitee-release@v2.0.0
      with:
        gitee_action: upload_asset
        gitee_owner: ${{ secrets.GITEE_USER }}
        gitee_repo: niuma_gui
        gitee_token: ${{ secrets.GITEE_TOKEN }}
        gitee_tag_name: ${{ github.event.release.tag_name }}
        gitee_upload_retry_times: 3
        gitee_files: |
          dist/${{ matrix.output_name }}.7z
