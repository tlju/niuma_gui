name: 构建和发布

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.12'
  CACHE_VERSION: v2

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x64
            platform: linux
            platform_name: linux/amd64
            output_name: niuma-linux-x64
            python_cache_name: python-env-linux-x64
          - os: ubuntu-22.04
            arch: arm64
            platform: linux
            platform_name: linux/arm64
            output_name: niuma-linux-arm64
            python_cache_name: python-env-linux-arm64
          - os: windows-2022
            arch: x64
            platform: windows
            output_name: niuma-windows-x64
            python_cache_name: python-env-windows-x64

    steps:
    - name: '1. 检出代码'
      uses: actions/checkout@v6

    - name: '2. 设置 QEMU (arm64)'
      if: matrix.arch == 'arm64'
      uses: docker/setup-qemu-action@v4

    - name: '3. 显示缓存信息 (Linux)'
      if: matrix.platform == 'linux'
      run: |
        echo "=== Cache Configuration ==="
        echo "Platform: ${{ matrix.platform }}"
        echo "Architecture: ${{ matrix.arch }}"
        echo "Python Version: ${{ env.PYTHON_VERSION }}"
        echo "Cache Version: ${{ env.CACHE_VERSION }}"
        echo "Cache Name: ${{ matrix.python_cache_name }}"
        echo ""
        echo "=== Expected Cache Key ==="
        echo "${{ env.CACHE_VERSION }}-${{ matrix.python_cache_name }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}"

    - name: '3. 显示缓存信息 (Windows)'
      if: matrix.platform == 'windows'
      run: |
        Write-Host "=== Cache Configuration ==="
        Write-Host "Platform: ${{ matrix.platform }}"
        Write-Host "Architecture: ${{ matrix.arch }}"
        Write-Host "Python Version: ${{ env.PYTHON_VERSION }}"
        Write-Host "Cache Version: ${{ env.CACHE_VERSION }}"
        Write-Host "Cache Name: ${{ matrix.python_cache_name }}"
        Write-Host ""
        Write-Host "=== Expected Cache Key ==="
        Write-Host "${{ env.CACHE_VERSION }}-${{ matrix.python_cache_name }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}"
      shell: powershell

    - name: '4. 恢复 Python 环境缓存 (Linux)'
      if: matrix.platform == 'linux'
      uses: actions/cache@v5
      id: cache-python-linux
      with:
        path: python-env-${{ matrix.arch }}.tar.gz
        key: ${{ env.CACHE_VERSION }}-${{ matrix.python_cache_name }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ env.CACHE_VERSION }}-${{ matrix.python_cache_name }}-${{ env.PYTHON_VERSION }}-
          ${{ env.CACHE_VERSION }}-${{ matrix.python_cache_name }}-

    - name: '5. 恢复 Qt6 环境缓存 (arm64)'
      if: matrix.platform == 'linux' && matrix.arch == 'arm64'
      uses: actions/cache@v5
      id: cache-qt6-arm64
      with:
        path: qt6-env-arm64.tar.gz
        key: ${{ env.CACHE_VERSION }}-qt6-env-arm64-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ env.CACHE_VERSION }}-qt6-env-arm64-

    - name: '6. 恢复 Python 环境缓存 (Windows)'
      if: matrix.platform == 'windows'
      uses: actions/cache@v5
      id: cache-python-windows
      with:
        path: python-env-${{ matrix.arch }}.7z
        key: ${{ env.CACHE_VERSION }}-${{ matrix.python_cache_name }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ env.CACHE_VERSION }}-${{ matrix.python_cache_name }}-${{ env.PYTHON_VERSION }}-
          ${{ env.CACHE_VERSION }}-${{ matrix.python_cache_name }}-

    - name: '7. 检查缓存命中状态 (Linux)'
      if: matrix.platform == 'linux'
      run: |
        echo "=== Cache Hit Status ==="
        if [ "${{ steps.cache-python-linux.outputs.cache-hit }}" = "true" ]; then
          echo "Python Cache HIT!"
          echo "Cache file info:"
          ls -lh python-env-${{ matrix.arch }}.tar.gz || echo "Cache file not found"
        else
          echo "Python Cache MISS"
          echo "Will build Python environment..."
        fi
        if [ "${{ matrix.arch }}" = "arm64" ]; then
          if [ "${{ steps.cache-qt6-arm64.outputs.cache-hit }}" = "true" ]; then
            echo "Qt6 Cache HIT!"
          else
            echo "Qt6 Cache MISS"
            echo "Will build Qt6 environment..."
          fi
        fi

    - name: '7. 检查缓存命中状态 (Windows)'
      if: matrix.platform == 'windows'
      run: |
        Write-Host "=== Cache Hit Status ==="
        if ("${{ steps.cache-python-windows.outputs.cache-hit }}" -eq "true") {
          Write-Host "Python Cache HIT!"
          Write-Host "Cache file info:"
          Get-Item python-env-${{ matrix.arch }}.7z -ErrorAction SilentlyContinue | Select-Object Name, Length, LastWriteTime
        } else {
          Write-Host "Python Cache MISS"
          Write-Host "Will build Python environment..."
        }
      shell: powershell

    - name: '8. 设置 Python (Windows)'
      if: matrix.platform == 'windows' && steps.cache-python-windows.outputs.cache-hit != 'true'
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: '9. 安装依赖 (Windows)'
      if: matrix.platform == 'windows' && steps.cache-python-windows.outputs.cache-hit != 'true'
      run: |
        Write-Host "=== Installing Python Dependencies ==="
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install nuitka ordered-set zstandard
        Write-Host "=== Dependencies Installed ==="
        pip list
      shell: powershell

    - name: '10. 安装构建依赖 (Windows)'
      if: matrix.platform == 'windows' && steps.cache-python-windows.outputs.cache-hit != 'true'
      run: |
        choco install ccache -y

    - name: '11. 打包 Python 环境 (Windows)'
      if: matrix.platform == 'windows' && steps.cache-python-windows.outputs.cache-hit != 'true'
      run: |
        Write-Host "=== Packaging Python Environment ==="
        $pythonPath = python -c "import sys; print(sys.prefix)"
        Write-Host "Python Path: $pythonPath"
        7z a -t7z -mx=9 python-env-${{ matrix.arch }}.7z "$pythonPath\*"
        Write-Host "=== Packaging Complete ==="
        Get-Item python-env-${{ matrix.arch }}.7z | Select-Object Name, Length, LastWriteTime
      shell: powershell

    - name: '12. 恢复 Python 环境 (Windows)'
      if: matrix.platform == 'windows' && steps.cache-python-windows.outputs.cache-hit == 'true'
      run: |
        Write-Host "=== Restoring Python Environment ==="
        $destPath = "$env:LOCALAPPDATA\python-cache"
        New-Item -ItemType Directory -Force -Path $destPath
        7z x python-env-${{ matrix.arch }}.7z -o"$destPath" -y
        Add-Content -Path $env:GITHUB_PATH -Value "$destPath\Scripts"
        Add-Content -Path $env:GITHUB_PATH -Value "$destPath"
        Write-Host "=== Environment Restored ==="
        python --version
        pip --version
      shell: powershell

    - name: '13. 验证 Python 环境 (Windows)'
      if: matrix.platform == 'windows'
      run: |
        echo "=== Verifying Python Environment ==="
        python --version
        pip --version
        pip list | grep -i nuitka || echo "Nuitka not found in pip list"
        ccache --version || echo "ccache not available"
        echo "Python Environment Verified Successfully"
      shell: bash

    - name: '14. 准备 Python 环境 (Linux)'
      if: matrix.platform == 'linux' && (steps.cache-python-linux.outputs.cache-hit != 'true' || (matrix.arch == 'arm64' && steps.cache-qt6-arm64.outputs.cache-hit != 'true'))
      run: |
        docker run --rm \
          --platform ${{ matrix.platform_name }} \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          debian:10.10 \
          bash -c '
            set -e
            
            echo "=== 检查缓存状态 ==="
            PYTHON_CACHED="${{ steps.cache-python-linux.outputs.cache-hit }}"
            QT6_CACHED="${{ steps.cache-qt6-arm64.outputs.cache-hit }}"
            echo "Python 缓存命中: $PYTHON_CACHED"
            echo "Qt6 缓存命中: $QT6_CACHED"
            
            if [ "$PYTHON_CACHED" = "true" ] && [ "${{ matrix.arch }}" != "arm64" ]; then
              echo "Python 环境已缓存，跳过编译"
              exit 0
            fi
            
            if [ "$PYTHON_CACHED" = "true" ] && [ "${{ matrix.arch }}" = "arm64" ] && [ "$QT6_CACHED" = "true" ]; then
              echo "Python 和 Qt6 环境已缓存，跳过编译"
              exit 0
            fi
            
            echo "=== 配置 apt 源 (Debian 10 已归档) ==="
            echo "deb http://archive.debian.org/debian buster main" > /etc/apt/sources.list
            echo "deb http://archive.debian.org/debian buster-updates main" >> /etc/apt/sources.list
            echo "Acquire::Check-Valid-Until false;" > /etc/apt/apt.conf.d/99no-check-valid-until
            
            echo "=== 安装系统依赖 ==="
            apt-get update
            apt-get install -y \
              gcc g++ make wget patchelf \
              libxrender-dev libxext-dev libx11-dev \
              libxcb1-dev libxkbcommon-dev \
              libxcb-* \
              libgl1-mesa-dev libegl1-mesa-dev \
              libxkbcommon-x11-dev \
              libssl-dev \
              bzip2 libbz2-dev \
              libffi-dev \
              zlib1g-dev \
              liblzma-dev \
              libsqlite3-dev \
              libreadline-dev \
              tk-dev \
              libgdbm-dev
            
            if [ "$PYTHON_CACHED" != "true" ]; then
              echo "=== 安装 Python 3.12 ==="
              cd /tmp
              wget -q https://www.python.org/ftp/python/3.12.13/Python-3.12.13.tgz
              tar xzf Python-3.12.13.tgz
              cd Python-3.12.13
              ./configure --enable-optimizations --prefix=/usr/local/python3.12
              make -j$(nproc)
              make install
              
              echo "=== 安装 Python 依赖 ==="
              cd /workspace
              /usr/local/python3.12/bin/python3.12 -m pip install --upgrade pip setuptools wheel
            else
              echo "=== Python 环境已缓存，跳过 Python 编译 ==="
            fi
            
            if [ "${{ matrix.arch }}" = "arm64" ] && [ "$QT6_CACHED" != "true" ]; then
              echo "=== 安装 Qt6 编译依赖 (arm64) ==="
              apt-get install -y \
                ninja-build perl python3 \
                libgles2-mesa-dev libwayland-dev wayland-protocols \
                libinput-dev libxkbcommon-dev libdrm-dev \
                libgbm-dev libasound2-dev libpulse-dev \
                libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
                libfreetype6-dev libfontconfig1-dev \
                libharfbuzz-dev libjpeg-dev libpng-dev \
                libstdc++-dev
              
              echo "=== 安装 CMake 3.30 (Qt6 需要 3.16+) ==="
              cd /tmp
              CMAKE_VERSION=3.30.5
              wget -q https://github.com/Kitware/CMake/releases/download/v${CMAKE_VERSION}/cmake-${CMAKE_VERSION}-linux-aarch64.tar.gz
              tar -xzf cmake-${CMAKE_VERSION}-linux-aarch64.tar.gz
              export PATH=/tmp/cmake-${CMAKE_VERSION}-linux-aarch64/bin:$PATH
              cmake --version
              
              echo "=== 下载 Qt6 源码 (arm64) ==="
              cd /tmp
              wget -q https://download.qt.io/official_releases/qt/6.5/6.5.3/single/qt-everywhere-src-6.5.3.tar.xz
              tar -xf qt-everywhere-src-6.5.3.tar.xz
              cd qt-everywhere-src-6.5.3
              
              echo "=== 配置 Qt6 (arm64) ==="
              mkdir build && cd build
              cmake .. \
                -G "Unix Makefiles" \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=/opt/qt6 \
                -DCMAKE_CXX_FLAGS="-std=c++17" \
                -DCMAKE_EXE_LINKER_FLAGS="-lstdc++fs" \
                -DCMAKE_SHARED_LINKER_FLAGS="-lstdc++fs" \
                -DCMAKE_MODULE_LINKER_FLAGS="-lstdc++fs" \
                -DCMAKE_CXX_STANDARD_LIBRARIES="-lstdc++fs" \
                -DQT_BUILD_EXAMPLES=OFF \
                -DQT_BUILD_TESTS=OFF \
                -DQT_FEATURE_vulkan=OFF \
                -DQT_FEATURE_opengl=ON \
                -DQT_FEATURE_opengles2=ON \
                -DQT_FEATURE_egl=ON \
                -DQT_FEATURE_xcb=ON \
                -DQT_FEATURE_xcb_xlib=ON \
                -DQT_FEATURE_xlib=ON
              
              echo "=== 编译 Qt6 (arm64 - 这可能需要较长时间) ==="
              make -j$(nproc)
              
              echo "=== 安装 Qt6 (arm64) ==="
              cmake --install .
              
              export PATH="/opt/qt6/bin:$PATH"
              export QT_PLUGIN_PATH="/opt/qt6/plugins"
              export LD_LIBRARY_PATH="/opt/qt6/lib:$LD_LIBRARY_PATH"
              qmake --version
              
              echo "=== 安装 PyQt6 (arm64 - 从源码编译) ==="
              cd /workspace
              export PATH="/usr/local/python3.12/bin:$PATH"
              export PYTHONPATH="/usr/local/python3.12/lib/python3.12/site-packages:$PYTHONPATH"
              pip3.12 install PyQt6-sip sip html5lib
              pip3.12 install --no-binary :all: PyQt6
              
              echo "=== 编译 PyQt6-QScintilla (arm64) ==="
              pip3.12 install --no-binary :all: PyQt6-QScintilla
            elif [ "$PYTHON_CACHED" != "true" ]; then
              echo "=== 安装 PyQt6 (x64 - 使用预编译包) ==="
              /usr/local/python3.12/bin/pip3.12 install --only-binary=:all: PyQt6 PyQt6-Qt6 PyQt6-sip
            fi
            
            if [ "$PYTHON_CACHED" != "true" ]; then
              /usr/local/python3.12/bin/pip3.12 install -r requirements.txt
              /usr/local/python3.12/bin/pip3.12 install nuitka ordered-set zstandard
              
              echo "=== 打包 Python 环境 ==="
              cd /usr/local
              tar -czf /workspace/python-env-${{ matrix.arch }}.tar.gz python3.12
              ls -lh /workspace/python-env-${{ matrix.arch }}.tar.gz
            fi
            
            if [ "${{ matrix.arch }}" = "arm64" ] && [ "$QT6_CACHED" != "true" ]; then
              echo "=== 打包 Qt6 环境 (arm64) ==="
              cd /opt
              tar -czf /workspace/qt6-env-arm64.tar.gz qt6
              ls -lh /workspace/qt6-env-arm64.tar.gz
            fi
          '
      shell: bash

    - name: '15. 在 Debian 10.10 容器内构建 (Linux)'
      if: matrix.platform == 'linux'
      run: |
        docker run --rm \
          --platform ${{ matrix.platform_name }} \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          debian:10.10 \
          bash -c '
            set -e
            
            echo "=== 配置 apt 源 (Debian 10 已归档) ==="
            echo "deb http://archive.debian.org/debian buster main" > /etc/apt/sources.list
            echo "deb http://archive.debian.org/debian buster-updates main" >> /etc/apt/sources.list
            echo "Acquire::Check-Valid-Until false;" > /etc/apt/apt.conf.d/99no-check-valid-until
            
            echo "=== 安装系统依赖 ==="
            apt-get update
            apt-get install -y \
              gcc g++ make wget patchelf \
              libxrender-dev libxext-dev libx11-dev \
              libxcb1-dev libxkbcommon-dev \
              libxcb-* \
              libgl1-mesa-dev libegl1-mesa-dev \
              libxkbcommon-x11-dev \
              libssl-dev \
              bzip2 libbz2-dev \
              libffi-dev \
              zlib1g-dev \
              liblzma-dev \
              libsqlite3-dev \
              libreadline-dev \
              tk-dev \
              libgdbm-dev \
              libxkbcommon-x11-0 \
              libxcb-cursor0 \
              libxcb-icccm4 \
              libxcb-image0 \
              libxcb-keysyms1 \
              libxcb-randr0 \
              libxcb-render-util0 \
              libxcb-shape0 \
              libxcb-xfixes0 \
              libxcb-xinerama0 \
              libxcb-xkb1
            
            echo "=== 解压 Python 环境 ==="
            cd /usr/local
            tar -xzf /workspace/python-env-${{ matrix.arch }}.tar.gz
            ln -sf /usr/local/python3.12/bin/python3.12 /usr/local/bin/python3
            ln -sf /usr/local/python3.12/bin/pip3.12 /usr/local/bin/pip3
            python3 --version
            
            if [ "${{ matrix.arch }}" = "arm64" ]; then
              echo "=== 解压 Qt6 环境 (arm64) ==="
              cd /opt
              tar -xzf /workspace/qt6-env-arm64.tar.gz
              export PATH="/opt/qt6/bin:$PATH"
              export QT_PLUGIN_PATH="/opt/qt6/plugins"
              export LD_LIBRARY_PATH="/opt/qt6/lib:$LD_LIBRARY_PATH"
              echo "Qt6 插件目录内容:"
              ls -la /opt/qt6/plugins/platforms/ || echo "platforms 目录不存在"
              qmake --version
              echo "Qt6 环境已配置"
            fi
            
            echo "=== 验证 Python 环境 ==="
            python3 -c '"'"'import sys; print(sys.executable)'"'"'
            python3 -c '"'"'from PyQt6.QtCore import PYQT_VERSION_STR; print("PyQt6 version:", PYQT_VERSION_STR)'"'"'
            
            echo "=== 使用 Nuitka 构建 ==="
            cd /workspace
            python3 -m nuitka --standalone \
              --enable-plugins=pyqt6 \
              --include-qt-plugins=qml,platforms,imageformats,iconengines \
              --follow-imports \
              --nofollow-import-to=tkinter,matplotlib,pandas,scipy,pytest,doctest \
              --nofollow-import-to=tests \
              --include-data-dir=gui/styles=gui/styles \
              --output-dir=dist \
              --output-filename=${{ matrix.output_name }} \
              --assume-yes-for-downloads \
              --jobs=$(nproc) \
              --file-reference-choice=runtime \
              --include-package-data=PyQt6 \
              --linux-icon=icons/app.png \
              main.py
            
            echo "=== 验证构建输出 ==="
            ls -la dist/
            if [ -d "dist/main.dist" ]; then
              echo "构建成功: main.dist"
              ls -la dist/main.dist
              mv dist/main.dist dist/${{ matrix.output_name }}
              echo "重命名为: ${{ matrix.output_name }}"
            else
              echo "构建失败: 输出目录未找到"
              exit 1
            fi
            
            echo "=== 压缩构建产物 ==="
            cd dist
            tar -I "gzip -9" -cvf ${{ matrix.output_name }}.tar.gz -C ${{ matrix.output_name }} .
            ls -lh ${{ matrix.output_name }}.*
            
            echo "=== 修复文件权限 ==="
            chown -R 1001:1001 /workspace/dist
            chmod -R 755 /workspace/dist
          '
      shell: bash

    - name: '16. 使用 Nuitka 构建 (Windows)'
      if: matrix.platform == 'windows'
      run: |
        python -m nuitka --standalone \
          --enable-plugins=pyqt6 \
          --include-qt-plugins=qml,platforms,imageformats,iconengines \
          --follow-imports \
          --nofollow-import-to=tkinter,matplotlib,pandas,scipy,pytest,doctest \
          --nofollow-import-to=tests \
          --include-data-dir=gui/styles=gui/styles \
          --include-data-file=icons/app.ico=icons/app.ico \
          --windows-console-mode=disable \
          --output-dir=dist \
          --output-filename=${{ matrix.output_name }} \
          --assume-yes-for-downloads \
          --jobs=$(nproc) \
          --include-package-data=PyQt6 \
          --windows-icon-from-ico=icons/app.ico \
          main.py
      shell: bash

    - name: '17. 验证构建输出 (Windows)'
      if: matrix.platform == 'windows'
      run: |
        echo "检查 dist 目录内容:"
        ls -la dist/
        if [ -d "dist/main.dist" ]; then
          echo "构建成功: main.dist"
          ls -la dist/main.dist
          mv dist/main.dist dist/${{ matrix.output_name }}
          echo "重命名为: ${{ matrix.output_name }}"
        else
          echo "构建失败: 输出目录未找到"
          exit 1
        fi
      shell: bash

    - name: '18. 压缩构建产物 (Windows)'
      if: matrix.platform == 'windows'
      run: |
        cd dist
        7z a -t7z -mx=9 -m0=lzma2 -mfb=64 -md=32m -ms=on ${{ matrix.output_name }}.7z ${{ matrix.output_name }}/*
        ls -lh ${{ matrix.output_name }}.*
      shell: bash

    - name: '19. 上传构建产物'
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.output_name }}
        path: |
          dist/${{ matrix.output_name }}.tar.gz
          dist/${{ matrix.output_name }}.7z
        retention-days: 30

    - name: '20. 上传到发布'
      if: github.event_name == 'release' && github.event.release.tag_name != ''
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ github.event.release.tag_name }}
        files: |
          dist/${{ matrix.output_name }}.tar.gz
          dist/${{ matrix.output_name }}.7z
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: '21. 上传 Python 环境到发布 (Linux)'
      if: github.event_name == 'release' && github.event.release.tag_name != '' && matrix.platform == 'linux'
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ github.event.release.tag_name }}
        files: python-env-${{ matrix.arch }}.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: '22. 上传 Python 环境到发布 (Windows)'
      if: github.event_name == 'release' && github.event.release.tag_name != '' && matrix.platform == 'windows'
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ github.event.release.tag_name }}
        files: python-env-${{ matrix.arch }}.7z
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: '23. 上传 Qt6 环境到发布 (arm64)'
      if: github.event_name == 'release' && github.event.release.tag_name != '' && matrix.arch == 'arm64'
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ github.event.release.tag_name }}
        files: qt6-env-arm64.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: '24. 构建总结 (Linux)'
      if: matrix.platform == 'linux'
      run: |
        echo "========================================"
        echo "构建总结"
        echo "========================================"
        echo "平台: ${{ matrix.platform }} (${{ matrix.arch }})"
        if [ "${{ steps.cache-python-linux.outputs.cache-hit }}" = "true" ]; then
          echo "Python 缓存状态: 命中"
        else
          echo "Python 缓存状态: 未命中 (已构建新缓存)"
        fi
        if [ "${{ matrix.arch }}" = "arm64" ]; then
          if [ "${{ steps.cache-qt6-arm64.outputs.cache-hit }}" = "true" ]; then
            echo "Qt6 缓存状态: 命中"
          else
            echo "Qt6 缓存状态: 未命中 (已构建新缓存)"
          fi
        fi
        echo "构建产物: ${{ matrix.output_name }}"
        echo "========================================"
      shell: bash

    - name: '24. 构建总结 (Windows)'
      if: matrix.platform == 'windows'
      run: |
        Write-Host "========================================"
        Write-Host "Build Summary"
        Write-Host "========================================"
        Write-Host "Platform: ${{ matrix.platform }} (${{ matrix.arch }})"
        if ("${{ steps.cache-python-windows.outputs.cache-hit }}" -eq "true") {
          Write-Host "Python Cache Status: HIT"
        } else {
          Write-Host "Python Cache Status: MISS (New cache built)"
        }
        Write-Host "Build Artifact: ${{ matrix.output_name }}"
        Write-Host "========================================"
      shell: powershell
