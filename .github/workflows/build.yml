name: 构建和发布

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.10'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x64
            platform: linux
            output_name: niuma-linux-x64
          - os: ubuntu-22.04
            arch: arm64
            platform: linux
            output_name: niuma-linux-arm64
          - os: windows-2022
            arch: x64
            platform: windows
            output_name: niuma-windows-x64.exe

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 QEMU (arm64)
      if: matrix.arch == 'arm64'
      uses: docker/setup-qemu-action@v3

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt
          .github/workflows/build.yml

    - name: 缓存 pip 包
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: pip-${{ matrix.os }}-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          pip-${{ matrix.os }}-

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install nuitka ordered-set zstandard

    - name: 安装构建依赖 (Linux)
      if: matrix.platform == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache build-essential \
          libegl1 libgl1-mesa-glx libxkbcommon-x11-0 \
          libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
          libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
          libxcb-cursor0

    - name: 验证 Python 环境
      run: |
        python --version
        pip --version
        pip list | grep -i nuitka

    - name: 缓存 Nuitka 编译
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/Nuitka
          ~/.nuitka
          build
        key: nuitka-${{ matrix.os }}-${{ matrix.arch }}-${{ hashFiles('**/*.py', 'requirements.txt') }}
        restore-keys: |
          nuitka-${{ matrix.os }}-${{ matrix.arch }}-
          nuitka-${{ matrix.os }}-

    - name: 缓存 ccache (Linux)
      if: matrix.platform == 'linux'
      uses: actions/cache@v4
      with:
        path: ~/.cache/ccache
        key: ccache-${{ matrix.os }}-${{ matrix.arch }}-${{ hashFiles('**/*.py') }}
        restore-keys: |
          ccache-${{ matrix.os }}-${{ matrix.arch }}-
          ccache-${{ matrix.os }}-

    - name: 使用 Nuitka 构建
      run: |
        if [ "${{ matrix.platform }}" = "windows" ]; then
          python -m nuitka --standalone --onefile --windows-disable-console \
            --enable-plugin=pyqt6 \
            --follow-imports \
            --nofollow-import-to=tkinter,matplotlib,numpy,pandas,scipy \
            --output-dir=dist \
            --output-filename=${{ matrix.output_name }} \
            --assume-yes-for-downloads \
            --jobs=$(nproc) \
            --lto=yes \
            --include-package-data=pyqt6 \
            --windows-icon-from-ico=icons/app.ico \
            --remove-output \
            --no-progress-bar \
            main.py
        else
          python -m nuitka --standalone --onefile --disable-console \
            --enable-plugin=pyqt6 \
            --follow-imports \
            --nofollow-import-to=tkinter,matplotlib,numpy,pandas,scipy \
            --output-dir=dist \
            --output-filename=${{ matrix.output_name }} \
            --lto=yes \
            --assume-yes-for-downloads \
            --jobs=$(nproc) \
            --file-reference-choice=runtime \
            --include-package-data=pyqt6 \
            --linux-icon=icons/app.png \
            --remove-output \
            --no-progress-bar \
            main.py
        fi
      shell: bash

    - name: 验证构建输出
      run: |
        if [ -f "dist/${{ matrix.output_name }}" ]; then
          echo "构建成功: ${{ matrix.output_name }}"
          ls -lh dist/${{ matrix.output_name }}
        else
          echo "构建失败: 输出文件未找到"
          exit 1
        fi
      shell: bash

    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.output_name }}
        path: dist/${{ matrix.output_name }}
        retention-days: 30

    - name: 上传到发布
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: dist/${{ matrix.output_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-to-gitee:
    name: 同步到 Gitee
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    steps:
    - name: 检查 GITEE_TOKEN
      env:
        GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      run: |
        if [ -z "$GITEE_TOKEN" ]; then
          echo "⚠️ GITEE_TOKEN 未配置，跳过同步到 Gitee"
          exit 0
        fi
        echo "has_token=true" >> $GITHUB_OUTPUT
      id: check-token

    - name: 检出代码
      if: steps.check-token.outputs.has_token == 'true'
      uses: actions/checkout@v4

    - name: 获取 Release 信息
      if: steps.check-token.outputs.has_token == 'true'
      id: release-info
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        RELEASE_INFO=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
          "https://api.github.com/repos/${{ github.repository }}/releases/latest")

        TAG_NAME=$(echo "$RELEASE_INFO" | jq -r '.tag_name')
        RELEASE_NAME=$(echo "$RELEASE_INFO" | jq -r '.name')
        RELEASE_BODY=$(echo "$RELEASE_INFO" | jq -r '.body')
        TARGET_COMMITISH=$(echo "$RELEASE_INFO" | jq -r '.target_commitish')
        PRERELEASE=$(echo "$RELEASE_INFO" | jq -r '.prerelease')

        echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
        echo "release_name=$RELEASE_NAME" >> $GITHUB_OUTPUT
        echo "target_commitish=$TARGET_COMMITISH" >> $GITHUB_OUTPUT
        echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT

        RELEASE_BODY_ESCAPED=$(echo "$RELEASE_BODY" | jq -Rs .)
        echo "release_body=$RELEASE_BODY_ESCAPED" >> $GITHUB_OUTPUT

        echo "Release 标签: $TAG_NAME"

    - name: 创建 Gitee Release
      if: steps.check-token.outputs.has_token == 'true'
      env:
        GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      run: |
        GITEE_OWNER="${{ github.repository_owner }}"
        GITEE_REPO="${{ github.event.repository.name }}"

        RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer $GITEE_TOKEN" \
          -d '{
            "tag_name": "${{ steps.release-info.outputs.tag_name }}",
            "name": "${{ steps.release-info.outputs.release_name }}",
            "body": ${{ steps.release-info.outputs.release_body }},
            "target_commitish": "${{ steps.release-info.outputs.target_commitish }}",
            "prerelease": ${{ steps.release-info.outputs.prerelease }}
          }' \
          "https://gitee.com/api/v5/repos/$GITEE_OWNER/$GITEE_REPO/releases")

        HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
        BODY=$(echo "$RESPONSE" | sed '$d')

        if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
          echo "✅ Gitee Release 创建成功"
          GITEE_RELEASE_ID=$(echo "$BODY" | jq -r '.id')
          echo "gitee_release_id=$GITEE_RELEASE_ID" >> $GITHUB_OUTPUT
        else
          echo "⚠️ Gitee Release 创建可能已存在或失败 (HTTP $HTTP_CODE)"
          echo "响应: $BODY"
        fi

    - name: 下载构建产物
      if: steps.check-token.outputs.has_token == 'true'
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: niuma-*
        merge-multiple: false

    - name: 上传资产到 Gitee
      if: steps.check-token.outputs.has_token == 'true'
      env:
        GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      run: |
        GITEE_OWNER="${{ github.repository_owner }}"
        GITEE_REPO="${{ github.event.repository.name }}"

        echo "📁 检查 artifacts 目录结构:"
        ls -la artifacts/ || echo "artifacts 目录不存在"
        find artifacts -type f -exec ls -lh {} \; || echo "没有找到文件"

        GITEE_RELEASE_ID=$(curl -s --connect-timeout 30 --max-time 60 \
          -H "Authorization: Bearer $GITEE_TOKEN" \
          "https://gitee.com/api/v5/repos/$GITEE_OWNER/$GITEE_REPO/releases/latest" | jq -r '.id')

        if [ -z "$GITEE_RELEASE_ID" ] || [ "$GITEE_RELEASE_ID" = "null" ]; then
          echo "❌ 无法获取 Gitee Release ID"
          exit 1
        fi

        echo "Gitee Release ID: $GITEE_RELEASE_ID"
        echo "开始上传资产..."

        FILES=$(find artifacts -type f \( -name "niuma-linux-x64" -o -name "niuma-linux-arm64" -o -name "niuma-windows-x64.exe" \))
        
        if [ -z "$FILES" ]; then
          echo "❌ 没有找到要上传的文件"
          exit 1
        fi

        echo "$FILES" | while IFS= read -r FILE; do
          if [ -n "$FILE" ]; then
            FILENAME=$(basename "$FILE")
            echo "📤 上传: $FILENAME (大小: $(ls -lh "$FILE" | awk '{print $5}'))"

            UPLOAD_RESPONSE=$(curl -s --connect-timeout 60 --max-time 600 -w "\n%{http_code}" -X POST \
              -H "Authorization: Bearer $GITEE_TOKEN" \
              -F "file=@$FILE" \
              "https://gitee.com/api/v5/repos/$GITEE_OWNER/$GITEE_REPO/releases/$GITEE_RELEASE_ID/attach_files?name=$FILENAME")

            UPLOAD_HTTP_CODE=$(echo "$UPLOAD_RESPONSE" | tail -n1)
            UPLOAD_BODY=$(echo "$UPLOAD_RESPONSE" | sed '$d')
            
            if [ "$UPLOAD_HTTP_CODE" -ge 200 ] && [ "$UPLOAD_HTTP_CODE" -lt 300 ]; then
              echo "✅ 上传成功: $FILENAME"
            else
              echo "❌ 上传失败: $FILENAME (HTTP $UPLOAD_HTTP_CODE)"
              echo "响应内容: $UPLOAD_BODY"
            fi
          fi
        done

    - name: 同步完成
      if: steps.check-token.outputs.has_token == 'true'
      run: |
        echo "🎉 Release ${{ steps.release-info.outputs.tag_name }} 已成功同步到 Gitee！"
