name: 构建和发布

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.10'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x64
            platform: linux
            platform_name: linux/amd64
            output_name: niuma-linux-x64
            python_cache_name: python-env-linux-x64
          - os: ubuntu-22.04
            arch: arm64
            platform: linux
            platform_name: linux/arm64
            output_name: niuma-linux-arm64
            python_cache_name: python-env-linux-arm64
          - os: windows-2022
            arch: x64
            platform: windows
            output_name: niuma-windows-x64
            python_cache_name: python-env-windows-x64

    steps:
    - name: 检出代码
      uses: actions/checkout@v6

    - name: 设置 QEMU (arm64)
      if: matrix.arch == 'arm64'
      uses: docker/setup-qemu-action@v4

    - name: 恢复 Python 环境缓存 (Linux)
      if: matrix.platform == 'linux'
      uses: actions/cache@v5
      id: cache-python-linux
      with:
        path: python-env-${{ matrix.arch }}.tar.gz
        key: ${{ matrix.python_cache_name }}-${{ github.ref_name }}
        restore-keys: |
          ${{ matrix.python_cache_name }}-main
          ${{ matrix.python_cache_name }}-

    - name: 恢复 Python 环境缓存 (Windows)
      if: matrix.platform == 'windows'
      uses: actions/cache@v5
      id: cache-python-windows
      with:
        path: python-env-${{ matrix.arch }}.7z
        key: ${{ matrix.python_cache_name }}-${{ github.ref_name }}
        restore-keys: |
          ${{ matrix.python_cache_name }}-main
          ${{ matrix.python_cache_name }}-

    - name: 设置 Python (Windows)
      if: matrix.platform == 'windows' && steps.cache-python-windows.outputs.cache-hit != 'true'
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 安装依赖 (Windows)
      if: matrix.platform == 'windows' && steps.cache-python-windows.outputs.cache-hit != 'true'
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install nuitka ordered-set zstandard

    - name: 安装构建依赖 (Windows)
      if: matrix.platform == 'windows' && steps.cache-python-windows.outputs.cache-hit != 'true'
      run: |
        choco install ccache -y

    - name: 打包 Python 环境 (Windows)
      if: matrix.platform == 'windows' && steps.cache-python-windows.outputs.cache-hit != 'true'
      run: |
        $pythonPath = python -c "import sys; print(sys.prefix)"
        7z a -t7z -mx=9 python-env-${{ matrix.arch }}.7z "$pythonPath\*"
      shell: powershell

    - name: 恢复 Python 环境 (Windows)
      if: matrix.platform == 'windows' && steps.cache-python-windows.outputs.cache-hit == 'true'
      run: |
        $destPath = "$env:LOCALAPPDATA\python-cache"
        New-Item -ItemType Directory -Force -Path $destPath
        7z x python-env-${{ matrix.arch }}.7z -o"$destPath" -y
        echo "$destPath\Scripts" >> $env:GITHUB_PATH
        echo "$destPath" >> $env:GITHUB_PATH
      shell: powershell

    - name: 验证 Python 环境 (Windows)
      if: matrix.platform == 'windows'
      run: |
        python --version
        pip --version
        pip list | grep -i nuitka
        ccache --version || echo "ccache not available"
      shell: bash

    - name: 准备 Python 环境 (Linux)
      if: matrix.platform == 'linux' && steps.cache-python-linux.outputs.cache-hit != 'true'
      run: |
        docker run --rm \
          --platform ${{ matrix.platform_name }} \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          debian:10.10 \
          bash -c '
            set -e
            
            echo "=== 配置 apt 源 (Debian 10 已归档) ==="
            echo "deb http://archive.debian.org/debian buster main" > /etc/apt/sources.list
            echo "deb http://archive.debian.org/debian buster-updates main" >> /etc/apt/sources.list
            echo "Acquire::Check-Valid-Until false;" > /etc/apt/apt.conf.d/99no-check-valid-until
            
            echo "=== 安装系统依赖 ==="
            apt-get update
            apt-get install -y \
              gcc g++ make wget patchelf \
              libxrender-dev libxext-dev libx11-dev \
              libxcb1-dev libxkbcommon-dev \
              libxcb-* \
              libgl1-mesa-dev libegl1-mesa-dev \
              libxkbcommon-x11-dev \
              libssl-dev \
              bzip2 libbz2-dev \
              libffi-dev \
              zlib1g-dev \
              liblzma-dev \
              libsqlite3-dev \
              libreadline-dev \
              tk-dev \
              libgdbm-dev
            
            echo "=== 安装 Python 3.10 ==="
            cd /tmp
            wget -q https://www.python.org/ftp/python/3.10.14/Python-3.10.14.tgz
            tar xzf Python-3.10.14.tgz
            cd Python-3.10.14
            ./configure --enable-optimizations --prefix=/usr/local/python3.10
            make -j$(nproc)
            make install
            
            echo "=== 安装 Python 依赖 ==="
            cd /workspace
            /usr/local/python3.10/bin/python3.10 -m pip install --upgrade pip setuptools wheel
            
            if [ "${{ matrix.arch }}" = "arm64" ]; then
              echo "=== 安装 Qt6 开发工具 (arm64) ==="
              /usr/local/python3.10/bin/pip3.10 install aqtinstall
              /usr/local/python3.10/bin/aqt install-qt linux_arm64 desktop 6.7.0 linux_gcc_arm64 -O /opt/qt6
              export PATH="/opt/qt6/6.7.0/linux_gcc_arm64/bin:$PATH"
              export QT_PLUGIN_PATH="/opt/qt6/6.7.0/linux_gcc_arm64/plugins"
              export LD_LIBRARY_PATH="/opt/qt6/6.7.0/linux_gcc_arm64/lib:$LD_LIBRARY_PATH"
              
              echo "=== 安装 PyQt6 (arm64 - 从源码编译) ==="
              /usr/local/python3.10/bin/pip3.10 install PyQt6-sip sip
              /usr/local/python3.10/bin/pip3.10 install --no-binary :all: PyQt6 PyQt6-Qt6
              
              echo "=== 编译 PyQt6-QScintilla (arm64) ==="
              /usr/local/python3.10/bin/pip3.10 install --no-binary :all: PyQt6-QScintilla
            else
              echo "=== 安装 PyQt6 (x64 - 使用预编译包) ==="
              /usr/local/python3.10/bin/pip3.10 install --only-binary=:all: PyQt6 PyQt6-Qt6 PyQt6-sip
            fi
            
            /usr/local/python3.10/bin/pip3.10 install -r requirements.txt
            /usr/local/python3.10/bin/pip3.10 install nuitka ordered-set zstandard
            
            echo "=== 打包 Python 环境 ==="
            cd /usr/local
            tar -czf /workspace/python-env-${{ matrix.arch }}.tar.gz python3.10
            ls -lh /workspace/python-env-${{ matrix.arch }}.tar.gz
          '
      shell: bash

    - name: 在 Debian 10.10 容器内构建 (Linux)
      if: matrix.platform == 'linux'
      run: |
        docker run --rm \
          --platform ${{ matrix.platform_name }} \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          debian:10.10 \
          bash -c '
            set -e
            
            echo "=== 配置 apt 源 (Debian 10 已归档) ==="
            echo "deb http://archive.debian.org/debian buster main" > /etc/apt/sources.list
            echo "deb http://archive.debian.org/debian buster-updates main" >> /etc/apt/sources.list
            echo "Acquire::Check-Valid-Until false;" > /etc/apt/apt.conf.d/99no-check-valid-until
            
            echo "=== 安装系统依赖 ==="
            apt-get update
            apt-get install -y \
              gcc g++ make wget patchelf \
              libxrender-dev libxext-dev libx11-dev \
              libxcb1-dev libxkbcommon-dev \
              libxcb-* \
              libgl1-mesa-dev libegl1-mesa-dev \
              libxkbcommon-x11-dev \
              libssl-dev \
              bzip2 libbz2-dev \
              libffi-dev \
              zlib1g-dev \
              liblzma-dev \
              libsqlite3-dev \
              libreadline-dev \
              tk-dev \
              libgdbm-dev
            
            echo "=== 解压 Python 环境 ==="
            cd /usr/local
            tar -xzf /workspace/python-env-${{ matrix.arch }}.tar.gz
            ln -sf /usr/local/python3.10/bin/python3.10 /usr/local/bin/python3
            ln -sf /usr/local/python3.10/bin/pip3.10 /usr/local/bin/pip3
            python3 --version
            
            if [ "${{ matrix.arch }}" = "arm64" ]; then
              echo "=== 安装 Qt6 开发工具 (arm64) ==="
              /usr/local/python3.10/bin/pip3.10 install aqtinstall
              /usr/local/python3.10/bin/aqt install-qt linux_arm64 desktop 6.7.0 linux_gcc_arm64 -O /opt/qt6
              export PATH="/opt/qt6/6.7.0/linux_gcc_arm64/bin:$PATH"
              export QT_PLUGIN_PATH="/opt/qt6/6.7.0/linux_gcc_arm64/plugins"
              export LD_LIBRARY_PATH="/opt/qt6/6.7.0/linux_gcc_arm64/lib:$LD_LIBRARY_PATH"
              echo "Qt6 环境已配置"
            fi
            
            echo "=== 使用 Nuitka 构建 ==="
            cd /workspace
            python3 -m nuitka --standalone \
              --enable-plugins=pyqt6 \
              --include-qt-plugins=qml,platforms,imageformats,iconengines,styles \
              --follow-imports \
              --nofollow-import-to=tkinter,matplotlib,pandas,scipy,pytest,doctest \
              --nofollow-import-to=tests \
              --include-data-dir=gui/styles=gui/styles \
              --output-dir=dist \
              --output-filename=${{ matrix.output_name }} \
              --assume-yes-for-downloads \
              --jobs=$(nproc) \
              --file-reference-choice=runtime \
              --include-package-data=PyQt6 \
              --linux-icon=icons/app.png \
              main.py
            
            echo "=== 验证构建输出 ==="
            ls -la dist/
            if [ -d "dist/main.dist" ]; then
              echo "构建成功: main.dist"
              ls -la dist/main.dist
              mv dist/main.dist dist/${{ matrix.output_name }}
              echo "重命名为: ${{ matrix.output_name }}"
            else
              echo "构建失败: 输出目录未找到"
              exit 1
            fi
            
            echo "=== 压缩构建产物 ==="
            cd dist
            tar -I "gzip -9" -cvf ${{ matrix.output_name }}.tar.gz -C ${{ matrix.output_name }} .
            ls -lh ${{ matrix.output_name }}.*
            
            echo "=== 修复文件权限 ==="
            chown -R 1001:1001 /workspace/dist
            chmod -R 755 /workspace/dist
          '
      shell: bash

    - name: 使用 Nuitka 构建 (Windows)
      if: matrix.platform == 'windows'
      run: |
        python -m nuitka --standalone \
          --enable-plugins=pyqt6 \
          --include-qt-plugins=qml,platforms,imageformats,iconengines,styles \
          --follow-imports \
          --nofollow-import-to=tkinter,matplotlib,pandas,scipy,pytest,doctest \
          --nofollow-import-to=tests \
          --include-data-dir=gui/styles=gui/styles \
          --include-data-file=icons/app.ico=icons/app.ico \
          --windows-console-mode=disable \
          --output-dir=dist \
          --output-filename=${{ matrix.output_name }} \
          --assume-yes-for-downloads \
          --jobs=$(nproc) \
          --include-package-data=PyQt6 \
          --windows-icon-from-ico=icons/app.ico \
          main.py
      shell: bash

    - name: 验证构建输出 (Windows)
      if: matrix.platform == 'windows'
      run: |
        echo "检查 dist 目录内容:"
        ls -la dist/
        if [ -d "dist/main.dist" ]; then
          echo "构建成功: main.dist"
          ls -la dist/main.dist
          mv dist/main.dist dist/${{ matrix.output_name }}
          echo "重命名为: ${{ matrix.output_name }}"
        else
          echo "构建失败: 输出目录未找到"
          exit 1
        fi
      shell: bash

    - name: 压缩构建产物 (Windows)
      if: matrix.platform == 'windows'
      run: |
        cd dist
        7z a -t7z -mx=9 -m0=lzma2 -mfb=64 -md=32m -ms=on ${{ matrix.output_name }}.7z ${{ matrix.output_name }}/*
        ls -lh ${{ matrix.output_name }}.*
      shell: bash

    - name: 上传构建产物
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.output_name }}
        path: |
          dist/${{ matrix.output_name }}.tar.gz
          dist/${{ matrix.output_name }}.7z
        retention-days: 30

    - name: 上传到发布
      if: github.event_name == 'release' && github.event.release.tag_name != ''
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ github.event.release.tag_name }}
        files: |
          dist/${{ matrix.output_name }}.tar.gz
          dist/${{ matrix.output_name }}.7z
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 上传 Python 环境到发布 (Linux)
      if: github.event_name == 'release' && github.event.release.tag_name != '' && matrix.platform == 'linux'
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ github.event.release.tag_name }}
        files: python-env-${{ matrix.arch }}.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 上传 Python 环境到发布 (Windows)
      if: github.event_name == 'release' && github.event.release.tag_name != '' && matrix.platform == 'windows'
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ github.event.release.tag_name }}
        files: python-env-${{ matrix.arch }}.7z
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
