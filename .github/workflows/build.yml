name: 构建和发布

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.10'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x64
            platform: linux
            output_name: niuma-linux-x64
          - os: ubuntu-22.04
            arch: arm64
            platform: linux
            output_name: niuma-linux-arm64
          - os: windows-2022
            arch: x64
            platform: windows
            output_name: niuma-windows-x64.exe

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 QEMU (arm64)
      if: matrix.arch == 'arm64'
      uses: docker/setup-qemu-action@v3

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt
          .github/workflows/build.yml

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install nuitka ordered-set zstandard

    - name: 安装构建依赖 (Linux)
      if: matrix.platform == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache build-essential \
          libegl1 libgl1-mesa-glx libxkbcommon-x11-0 \
          libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
          libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
          libxcb-cursor0

    - name: 验证 Python 环境
      run: |
        python --version
        pip --version
        pip list | grep -i nuitka

    - name: 使用 Nuitka 构建
      run: |
        if [ "${{ matrix.platform }}" = "windows" ]; then
          python -m nuitka --standalone --onefile \
            --enable-plugin=pyqt6 \
            --follow-imports \
            --nofollow-import-to=tkinter,matplotlib,pandas,scipy,pytest,unittest,doctest \
            --include-package=paramiko \
            --include-package=bcrypt \
            --include-package=cryptography \
            --include-package=openpyxl \
            --include-package=xlsxwriter \
            --include-package=sqlalchemy \
            --include-package=pydantic \
            --include-package=pydantic_settings \
            --include-package=numpy \
            --include-package=pyqtgraph \
            --include-package=dotenv \
            --include-data-dir=gui/styles=gui/styles \
            --include-data-file=icons/app.ico=icons/app.ico \
            --windows-console-mode=disable \
            --output-dir=dist \
            --output-filename=${{ matrix.output_name }} \
            --assume-yes-for-downloads \
            --jobs=$(nproc) \
            --lto=yes \
            --include-package-data=pyqt6 \
            --windows-icon-from-ico=icons/app.ico \
            --remove-output \
            --no-progress-bar \
            main.py
        else
          python -m nuitka --standalone --onefile \
            --enable-plugin=pyqt6 \
            --follow-imports \
            --nofollow-import-to=tkinter,matplotlib,pandas,scipy,pytest,unittest,doctest \
            --include-package=paramiko \
            --include-package=bcrypt \
            --include-package=cryptography \
            --include-package=openpyxl \
            --include-package=xlsxwriter \
            --include-package=sqlalchemy \
            --include-package=pydantic \
            --include-package=pydantic_settings \
            --include-package=numpy \
            --include-package=pyqtgraph \
            --include-package=dotenv \
            --include-data-dir=gui/styles=gui/styles \
            --output-dir=dist \
            --output-filename=${{ matrix.output_name }} \
            --lto=yes \
            --assume-yes-for-downloads \
            --jobs=$(nproc) \
            --file-reference-choice=runtime \
            --include-package-data=pyqt6 \
            --linux-icon=icons/app.png \
            --remove-output \
            --no-progress-bar \
            main.py
        fi
      shell: bash

    - name: 验证构建输出
      run: |
        if [ -f "dist/${{ matrix.output_name }}" ]; then
          echo "构建成功: ${{ matrix.output_name }}"
          ls -lh dist/${{ matrix.output_name }}
        else
          echo "构建失败: 输出文件未找到"
          exit 1
        fi
      shell: bash

    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.output_name }}
        path: dist/${{ matrix.output_name }}
        retention-days: 30

    - name: 上传到发布
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: dist/${{ matrix.output_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-to-gitee:
    name: 同步到 Gitee
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    steps:
    - name: 检查 GITEE_TOKEN
      env:
        GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      run: |
        if [ -z "$GITEE_TOKEN" ]; then
          echo "GITEE_TOKEN 未配置，跳过同步到 Gitee"
          exit 0
        fi
        echo "has_token=true" >> $GITHUB_OUTPUT
      id: check-token

    - name: 检出代码
      if: steps.check-token.outputs.has_token == 'true'
      uses: actions/checkout@v4

    - name: 获取 Release 信息
      if: steps.check-token.outputs.has_token == 'true'
      id: release-info
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        RELEASE_INFO=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
          "https://api.github.com/repos/${{ github.repository }}/releases/latest")

        TAG_NAME=$(echo "$RELEASE_INFO" | jq -r '.tag_name')
        RELEASE_NAME=$(echo "$RELEASE_INFO" | jq -r '.name')
        RELEASE_BODY=$(echo "$RELEASE_INFO" | jq -r '.body')
        TARGET_COMMITISH=$(echo "$RELEASE_INFO" | jq -r '.target_commitish')
        PRERELEASE=$(echo "$RELEASE_INFO" | jq -r '.prerelease')

        echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
        echo "release_name=$RELEASE_NAME" >> $GITHUB_OUTPUT
        echo "target_commitish=$TARGET_COMMITISH" >> $GITHUB_OUTPUT
        echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT

        RELEASE_BODY_ESCAPED=$(echo "$RELEASE_BODY" | jq -Rs .)
        echo "release_body=$RELEASE_BODY_ESCAPED" >> $GITHUB_OUTPUT

        echo "Release 标签: $TAG_NAME"

    - name: 创建 Gitee Release
      if: steps.check-token.outputs.has_token == 'true'
      env:
        GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      run: |
        GITEE_OWNER="${{ github.repository_owner }}"
        GITEE_REPO="${{ github.event.repository.name }}"

        RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer $GITEE_TOKEN" \
          -d '{
            "tag_name": "${{ steps.release-info.outputs.tag_name }}",
            "name": "${{ steps.release-info.outputs.release_name }}",
            "body": ${{ steps.release-info.outputs.release_body }},
            "target_commitish": "${{ steps.release-info.outputs.target_commitish }}",
            "prerelease": ${{ steps.release-info.outputs.prerelease }}
          }' \
          "https://gitee.com/api/v5/repos/$GITEE_OWNER/$GITEE_REPO/releases")

        HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
        BODY=$(echo "$RESPONSE" | sed '$d')

        if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
          echo "Gitee Release 创建成功"
          GITEE_RELEASE_ID=$(echo "$BODY" | jq -r '.id')
          echo "gitee_release_id=$GITEE_RELEASE_ID" >> $GITHUB_OUTPUT
        else
          echo "Gitee Release 创建可能已存在或失败 (HTTP $HTTP_CODE)"
          echo "响应: $BODY"
        fi

    - name: 下载构建产物
      if: steps.check-token.outputs.has_token == 'true'
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: niuma-*
        merge-multiple: false

    - name: 上传资产到 Gitee
      if: steps.check-token.outputs.has_token == 'true'
      env:
        GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      run: |
        GITEE_OWNER="${{ github.repository_owner }}"
        GITEE_REPO="${{ github.event.repository.name }}"

        echo "=== 获取 Gitee Release 信息 ==="
        for i in {1..3}; do
          GITEE_RELEASE_INFO=$(curl -s --max-time 30 --connect-timeout 10 \
            "https://gitee.com/api/v5/repos/$GITEE_OWNER/$GITEE_REPO/releases/latest?access_token=$GITEE_TOKEN")
          
          GITEE_RELEASE_ID=$(echo "$GITEE_RELEASE_INFO" | jq -r '.id // empty')
          
          if [ -n "$GITEE_RELEASE_ID" ] && [ "$GITEE_RELEASE_ID" != "null" ]; then
            echo "✓ 成功获取 Release ID: $GITEE_RELEASE_ID"
            break
          fi
          
          echo "⚠ 尝试 $i/3: 获取 Release ID 失败"
          if [ $i -lt 3 ]; then
            sleep 5
          fi
        done

        if [ -z "$GITEE_RELEASE_ID" ] || [ "$GITEE_RELEASE_ID" = "null" ]; then
          echo "❌ 无法获取 Gitee Release ID"
          echo "API 响应: $GITEE_RELEASE_INFO"
          exit 1
        fi

        echo ""
        echo "=== 开始上传资产到 Gitee ==="
        echo "Release ID: $GITEE_RELEASE_ID"
        echo ""

        upload_file() {
          local FILE="$1"
          local FILENAME=$(basename "$FILE")
          local FILE_SIZE=$(stat -c%s "$FILE" 2>/dev/null || stat -f%z "$FILE" 2>/dev/null)
          local MAX_RETRIES=3
          local RETRY_COUNT=0
          local SUCCESS=false

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📁 文件: $FILENAME"
          echo "📊 大小: $(numfmt --to=iec-i --suffix=B $FILE_SIZE 2>/dev/null || echo "$FILE_SIZE bytes")"
          echo "📍 路径: $FILE"
          echo ""

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "� 上传尝试 $RETRY_COUNT/$MAX_RETRIES"
            
            UPLOAD_START=$(date +%s)
            
            UPLOAD_RESPONSE=$(curl -w "\n%{http_code}\n%{time_total}" \
              --max-time 600 \
              --connect-timeout 30 \
              -X POST \
              -F "access_token=$GITEE_TOKEN" \
              -F "release_id=$GITEE_RELEASE_ID" \
              -F "file=@$FILE" \
              "https://gitee.com/api/v5/repos/$GITEE_OWNER/$GITEE_REPO/releases/$GITEE_RELEASE_ID/attach_files" \
              2>&1)
            
            UPLOAD_EXIT_CODE=$?
            UPLOAD_END=$(date +%s)
            UPLOAD_DURATION=$((UPLOAD_END - UPLOAD_START))
            
            if [ $UPLOAD_EXIT_CODE -ne 0 ]; then
              echo "❌ curl 命令失败 (退出码: $UPLOAD_EXIT_CODE)"
              echo "错误信息: $UPLOAD_RESPONSE"
            else
              HTTP_CODE=$(echo "$UPLOAD_RESPONSE" | tail -n2 | head -n1)
              TIME_TOTAL=$(echo "$UPLOAD_RESPONSE" | tail -n1)
              RESPONSE_BODY=$(echo "$UPLOAD_RESPONSE" | head -n -2)
              
              if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
                echo "✅ 上传成功！"
                echo "   HTTP 状态码: $HTTP_CODE"
                echo "   耗时: ${UPLOAD_DURATION}s (curl: ${TIME_TOTAL}s)"
                SUCCESS=true
                break
              else
                echo "❌ 上传失败 (HTTP $HTTP_CODE)"
                echo "   响应内容: $RESPONSE_BODY"
              fi
            fi
            
            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              WAIT_TIME=$((RETRY_COUNT * 10))
              echo "⏳ 等待 ${WAIT_TIME}s 后重试..."
              sleep $WAIT_TIME
            fi
          done

          if [ "$SUCCESS" = false ]; then
            echo "❌ 上传失败: $FILENAME (已重试 $MAX_RETRIES 次)"
            return 1
          fi
          
          return 0
        }

        UPLOADED_COUNT=0
        FAILED_COUNT=0

        while IFS= read -r -d '' FILE; do
          if upload_file "$FILE"; then
            UPLOADED_COUNT=$((UPLOADED_COUNT + 1))
          else
            FAILED_COUNT=$((FAILED_COUNT + 1))
          fi
          echo ""
        done < <(find artifacts -type f \( -name "niuma-linux-x64" -o -name "niuma-linux-arm64" -o -name "niuma-windows-x64.exe" \) -print0)

        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "📊 上传统计:"
        echo "   ✅ 成功: $UPLOADED_COUNT"
        echo "   ❌ 失败: $FAILED_COUNT"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

        if [ $FAILED_COUNT -gt 0 ]; then
          echo "⚠️  部分文件上传失败"
          exit 1
        fi

    - name: 同步完成
      if: steps.check-token.outputs.has_token == 'true'
      run: |
        echo "Release ${{ steps.release-info.outputs.tag_name }} 已成功同步到 Gitee！"