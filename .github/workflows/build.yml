name: 构建和发布

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.10'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x64
            platform: linux
            output_name: niuma-linux-x64
          - os: ubuntu-22.04
            arch: arm64
            platform: linux
            output_name: niuma-linux-arm64
          - os: windows-2022
            arch: x64
            platform: windows
            output_name: niuma-windows-x64.exe

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 QEMU (arm64)
      if: matrix.arch == 'arm64'
      uses: docker/setup-qemu-action@v3

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt
          .github/workflows/build.yml

    - name: 缓存 pip 包
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: pip-${{ matrix.os }}-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          pip-${{ matrix.os }}-

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install nuitka ordered-set zstandard

    - name: 安装构建依赖 (Linux)
      if: matrix.platform == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache build-essential \
          libegl1 libgl1-mesa-glx libxkbcommon-x11-0 \
          libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
          libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
          libxcb-cursor0

    - name: 验证 Python 环境
      run: |
        python --version
        pip --version
        pip list | grep -i nuitka

    - name: 缓存 Nuitka 编译
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/Nuitka
          ~/.nuitka
          build
          ~/.cache/ccache
        key: nuitka-${{ matrix.os }}-${{ matrix.arch }}-${{ hashFiles('*.py', 'gui/*.py', 'core/*.py', 'models/*.py', 'services/*.py', 'requirements.txt') }}
        restore-keys: |
          nuitka-${{ matrix.os }}-${{ matrix.arch }}-
          nuitka-${{ matrix.os }}-

    - name: 使用 Nuitka 构建
      run: |
        if [ "${{ matrix.platform }}" = "windows" ]; then
          python -m nuitka --standalone --onefile --windows-disable-console \
            --enable-plugin=pyqt6 \
            --follow-imports \
            --nofollow-import-to=tkinter,matplotlib,numpy,pandas,scipy \
            --include-package=paramiko \
            --include-package=bcrypt \
            --include-package=cryptography \
            --include-package=openpyxl \
            --include-package=xlsxwriter \
            --include-package=sqlalchemy \
            --include-package=pydantic \
            --include-package=pydantic_settings \
            --include-data-dir=gui/styles=gui/styles \
            --include-data-file=icons/app.ico=icons/app.ico \
            --include-dll=bcrypt*.dll \
            --include-dll=cryptography*.dll \
            --output-dir=dist \
            --output-filename=${{ matrix.output_name }} \
            --assume-yes-for-downloads \
            --jobs=$(nproc) \
            --lto=yes \
            --include-package-data=pyqt6 \
            --windows-icon-from-ico=icons/app.ico \
            --remove-output \
            --no-progress-bar \
            main.py
        else
          python -m nuitka --standalone --onefile --disable-console \
            --enable-plugin=pyqt6 \
            --follow-imports \
            --nofollow-import-to=tkinter,matplotlib,numpy,pandas,scipy \
            --include-package=paramiko \
            --include-package=bcrypt \
            --include-package=cryptography \
            --include-package=openpyxl \
            --include-package=xlsxwriter \
            --include-package=sqlalchemy \
            --include-package=pydantic \
            --include-package=pydantic_settings \
            --include-data-dir=gui/styles=gui/styles \
            --output-dir=dist \
            --output-filename=${{ matrix.output_name }} \
            --lto=yes \
            --assume-yes-for-downloads \
            --jobs=$(nproc) \
            --file-reference-choice=runtime \
            --include-package-data=pyqt6 \
            --linux-icon=icons/app.png \
            --remove-output \
            --no-progress-bar \
            main.py
        fi
      shell: bash

    - name: 验证构建输出
      run: |
        if [ -f "dist/${{ matrix.output_name }}" ]; then
          echo "构建成功: ${{ matrix.output_name }}"
          ls -lh dist/${{ matrix.output_name }}
        else
          echo "构建失败: 输出文件未找到"
          exit 1
        fi
      shell: bash

    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.output_name }}
        path: dist/${{ matrix.output_name }}
        retention-days: 30

    - name: 上传到发布
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: dist/${{ matrix.output_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-to-gitee:
    name: 同步到 Gitee
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    steps:
    - name: 检查 GITEE_TOKEN
      env:
        GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      run: |
        if [ -z "$GITEE_TOKEN" ]; then
          echo "⚠️ GITEE_TOKEN 未配置，跳过同步到 Gitee"
          exit 0
        fi
        echo "has_token=true" >> $GITHUB_OUTPUT
      id: check-token

    - name: 检出代码
      if: steps.check-token.outputs.has_token == 'true'
      uses: actions/checkout@v4

    - name: 创建 Gitee Release
      if: steps.check-token.outputs.has_token == 'true'
      env:
        GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      run: |
        GITEE_OWNER="${{ github.repository_owner }}"
        GITEE_REPO="${{ github.event.repository.name }}"
        TAG="${{ github.event.release.tag_name }}"
        NAME="${{ github.event.release.name }}"
        BODY="${{ github.event.release.body }}"
        PRERELEASE="${{ github.event.release.prerelease }}"

        echo "🔍 创建 Gitee Release..."
        echo "📋 Tag: $TAG"
        echo "📋 Name: $NAME"
        echo "📋 Prerelease: $PRERELEASE"
        
        # 转义JSON中的特殊字符
        BODY_ESCAPED=$(echo "$BODY" | sed 's/\\/\\\\/g; s/"/\\"/g; s/$/\\$/g')
        
        # 构建JSON数据
        JSON_DATA="{\"tag_name\":\"$TAG\",\"name\":\"$NAME\",\"body\":\"$BODY_ESCAPED\",\"prerelease\":$PRERELEASE}"
        
        echo "📋 请求数据: $JSON_DATA"
        
        RELEASE_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
          "https://gitee.com/api/v5/repos/$GITEE_OWNER/$GITEE_REPO/releases" \
          -H "Authorization: Bearer $GITEE_TOKEN" \
          -H "Content-Type: application/json" \
          -d "$JSON_DATA")

        HTTP_CODE=$(echo "$RELEASE_RESPONSE" | tail -n1)
        RESPONSE_BODY=$(echo "$RELEASE_RESPONSE" | sed '$d')

        echo "📋 响应内容: $RESPONSE_BODY"

        if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
          echo "✅ Gitee Release 创建成功"
        else
          echo "⚠️ Gitee Release 创建可能已存在或失败 (HTTP $HTTP_CODE)"
          echo "响应: $RESPONSE_BODY"
        fi

  upload-assets-to-gitee:
    name: 上传构建产物到 Gitee
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    steps:
    - name: 检查 GITEE_TOKEN
      env:
        GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      run: |
        if [ -z "$GITEE_TOKEN" ]; then
          echo "⚠️ GITEE_TOKEN 未配置，跳过上传到 Gitee"
          exit 0
        fi
        echo "has_token=true" >> $GITHUB_OUTPUT
      id: check-token

    - name: 下载构建产物
      if: steps.check-token.outputs.has_token == 'true'
      uses: actions/download-artifact@v4
      with:
        pattern: niuma-*
        path: /tmp/artifacts
        merge-multiple: true

    - name: 检出 Gitee 仓库
      if: steps.check-token.outputs.has_token == 'true'
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository_owner }}/${{ github.event.repository.name }}
        token: ${{ secrets.GITEE_TOKEN }}
        ref: ${{ github.event.release.tag_name }}

    - name: 设置 Git
      if: steps.check-token.outputs.has_token == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

    - name: 复制构建产物
      if: steps.check-token.outputs.has_token == 'true'
      run: |
        mkdir -p releases
        cp /tmp/artifacts/* releases/
        ls -lh releases/

    - name: 提交到 Gitee
      if: steps.check-token.outputs.has_token == 'true'
      run: |
        git add releases/
        git commit -m "chore: upload release assets for ${{ github.event.release.tag_name }}" || echo "No changes to commit"

    - name: 推送到 Gitee
      if: steps.check-token.outputs.has_token == 'true'
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITEE_TOKEN }}
        branch: ${{ github.event.release.tag_name }}
        repository: ${{ github.repository_owner }}/${{ github.event.repository.name }}
