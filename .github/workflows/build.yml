name: 构建和发布

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'
  CACHE_VERSION: v1

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x64
            platform: linux
            platform_name: linux/amd64
            output_name: niuma-linux-x64
          - os: ubuntu-22.04
            arch: arm64
            platform: linux
            platform_name: linux/arm64
            output_name: niuma-linux-arm64
          - os: windows-2022
            arch: x64
            platform: windows
            output_name: niuma-windows-x64

    steps:
    - name: '1. 检出代码'
      uses: actions/checkout@v4

    - name: '2. 设置 QEMU (arm64)'
      if: matrix.arch == 'arm64'
      uses: docker/setup-qemu-action@v3

    # ==================== Linux: 使用 Debian 10.10 Docker 容器构建 ====================
    - name: '3. 恢复 Docker 镜像缓存 (Linux)'
      if: matrix.platform == 'linux'
      uses: actions/cache@v4
      id: cache-docker-image
      with:
        path: docker-image-${{ matrix.arch }}.tar
        key: ${{ env.CACHE_VERSION }}-docker-image-${{ matrix.arch }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ env.CACHE_VERSION }}-docker-image-${{ matrix.arch }}-${{ env.PYTHON_VERSION }}-
          ${{ env.CACHE_VERSION }}-docker-image-${{ matrix.arch }}-

    - name: '4. 创建 Docker 镜像 (Linux)'
      if: matrix.platform == 'linux' && steps.cache-docker-image.outputs.cache-hit != 'true'
      run: |
        CONTAINER_ID=$(docker run -d \
          --platform ${{ matrix.platform_name }} \
          debian:10.10 \
          tail -f /dev/null)

        docker exec $CONTAINER_ID bash -c '
          set -e

          echo "=== 配置 apt 源 (Debian 10 已归档) ==="
          echo "deb http://archive.debian.org/debian buster main" > /etc/apt/sources.list
          echo "deb http://archive.debian.org/debian buster-updates main" >> /etc/apt/sources.list
          echo "Acquire::Check-Valid-Until false;" > /etc/apt/apt.conf.d/99no-check-valid-until

          echo "=== 安装系统依赖 ==="
          apt-get update
          apt-get install -y \
            gcc g++ make wget \
            qt5-default qtbase5-dev qtchooser qttools5-dev-tools \
            libqt5gui5 libqt5core5a libqt5dbus5 \
            libxrender-dev libxext-dev libx11-dev libx11-xcb-dev \
            libxcb1-dev libxkbcommon-dev \
            libxcb-* \
            libgl1-mesa-dev libegl1-mesa-dev \
            libxkbcommon-x11-dev \
            libssl-dev \
            bzip2 libbz2-dev \
            libffi-dev \
            zlib1g-dev \
            liblzma-dev \
            libsqlite3-dev \
            libreadline-dev \
            tk-dev \
            libgdbm-dev \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1

          echo "=== 编译 Python 3.11 ==="
          cd /tmp
          wget -q https://www.python.org/ftp/python/3.11.15/Python-3.11.15.tgz
          tar xzf Python-3.11.15.tgz
          cd Python-3.11.15

          ./configure \
            --enable-optimizations \
            --enable-shared \
            --prefix=/usr/local/python3.11 \
            LDFLAGS="-Wl,-rpath,/usr/local/python3.11/lib"

          make -j$(nproc)
          make install

          echo "/usr/local/python3.11/lib" > /etc/ld.so.conf.d/python3.11.conf
          ldconfig

          ln -sf /usr/local/python3.11/bin/python3.11 /usr/local/bin/python3
          ln -sf /usr/local/python3.11/bin/pip3.11 /usr/local/bin/pip3

          echo "=== 安装 Python 包管理工具 ==="
          python3 -m pip install --upgrade pip setuptools wheel

          echo "=== 安装 PyQt5 ==="
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            echo "=== ARM64: 编译安装 PyQt5 ==="
            pip3 install --no-binary=:all: sip
            pip3 install --no-binary=:all: PyQt5-sip
            pip3 install PyQt-builder
            pip3 install pyqt5 --config-settings --confirm-license= --verbose
          else
            echo "=== x64: 安装预编译版本 ==="
            pip3 install --only-binary=:all: PyQt5 PyQt5-Qt5 PyQt5-sip
          fi

          echo "=== 清理临时文件 ==="
          cd /
          rm -rf /tmp/Python-3.11.15*
          apt-get clean
          rm -rf /var/lib/apt/lists/*
        '

        echo "=== 安装项目依赖 ==="
        docker cp requirements.txt $CONTAINER_ID:/tmp/requirements.txt
        docker exec $CONTAINER_ID pip3 install -r /tmp/requirements.txt

        echo "=== 提交容器为镜像 ==="
        docker commit $CONTAINER_ID niuma-build-${{ matrix.arch }}:latest
        docker save -o docker-image-${{ matrix.arch }}.tar niuma-build-${{ matrix.arch }}:latest
        docker rm -f $CONTAINER_ID
      shell: bash

    - name: '4.5. 保存 Docker 镜像缓存 (Linux)'
      if: matrix.platform == 'linux' && steps.cache-docker-image.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: docker-image-${{ matrix.arch }}.tar
        key: ${{ env.CACHE_VERSION }}-docker-image-${{ matrix.arch }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}

    - name: '5. 使用 PyInstaller 构建 (Linux)'
      if: matrix.platform == 'linux'
      run: |
        echo "=== 加载 Docker 镜像 ==="
        docker load -i docker-image-${{ matrix.arch }}.tar

        CONTAINER_ID=$(docker run -d \
          --platform ${{ matrix.platform_name }} \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          niuma-build-${{ matrix.arch }}:latest \
          tail -f /dev/null)

        docker exec $CONTAINER_ID bash -c '
          set -e

          echo "=== 验证环境 ==="
          python3 --version
          pip3 --version

          echo "=== 使用 PyInstaller 构建 ==="
          cd /workspace

          python3 -m PyInstaller \
            --noconfirm \
            --clean \
            --distpath dist \
            --workpath build \
            --contents-directory bin \
            --name ${{ matrix.output_name }} \
            --noconsole \
            --add-data "gui/styles:gui/styles" \
            --exclude-module tkinter \
            --exclude-module matplotlib \
            --exclude-module pandas \
            --exclude-module scipy \
            --exclude-module pytest \
            --exclude-module doctest \
            --exclude-module PyQt5.QtQuick \
            --exclude-module PyQt5.QtQuick3D \
            --exclude-module PyQt5.QtQml \
            --exclude-module PyQt5.QtQuickWidgets \
            main.py
        '

        echo "=== 清理容器 ==="
        docker rm -f $CONTAINER_ID
      shell: bash

    - name: '6. 验证并打包构建产物 (Linux)'
      if: matrix.platform == 'linux'
      run: |
        echo "=== 加载 Docker 镜像 ==="
        docker load -i docker-image-${{ matrix.arch }}.tar

        CONTAINER_ID=$(docker run -d \
          --platform ${{ matrix.platform_name }} \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          niuma-build-${{ matrix.arch }}:latest \
          tail -f /dev/null)

        docker exec $CONTAINER_ID bash -c '
          set -e

          echo "=== 验证并打包构建产物 ==="
          ls -la dist/
          if [ -d "dist/${{ matrix.output_name }}" ]; then
            cd dist
            tar -I "gzip -9" -cvf ${{ matrix.output_name }}.tar.gz -C ${{ matrix.output_name }} .
            chown -R 1001:1001 /workspace/dist
            chmod -R 755 /workspace/dist
          else
            echo "构建失败: 输出目录未找到"
            exit 1
          fi
        '

        echo "=== 清理容器 ==="
        docker rm -f $CONTAINER_ID
      shell: bash

    - name: '6.5. 推送 Docker 镜像到 DockerHub (Linux)'
      if: matrix.platform == 'linux'
      run: |
        echo "=== 登录 DockerHub ==="
        echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USER }}" --password-stdin

        IMAGE_NAME="niuma-build-${{ matrix.arch }}"
        DOCKERHUB_TAG="${{ secrets.DOCKERHUB_USER }}/${IMAGE_NAME}:latest"

        echo "=== 标记镜像 ==="
        docker tag ${IMAGE_NAME}:latest ${DOCKERHUB_TAG}

        echo "=== 推送镜像 ==="
        docker push ${DOCKERHUB_TAG}

        echo "=== 登出 DockerHub ==="
        docker logout
      shell: bash

    # ==================== Windows x64: 直接在 Runner 上构建 ====================
    - name: '7. 设置 Python (Windows)'
      if: matrix.platform == 'windows'
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: '8. 安装依赖 (Windows)'
      if: matrix.platform == 'windows'
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
      shell: powershell

    - name: '9. 使用 PyInstaller 构建 (Windows)'
      if: matrix.platform == 'windows'
      run: |
        python -m PyInstaller `
          --noconfirm `
          --clean `
          --distpath dist `
          --workpath build `
          --contents-directory bin `
          --name ${{ matrix.output_name }} `
          --noconsole `
          --add-data "gui/styles;gui/styles" `
          --add-data "icons/app.ico;icons" `
          --icon icons/app.ico `
          --exclude-module tkinter `
          --exclude-module matplotlib `
          --exclude-module pandas `
          --exclude-module scipy `
          --exclude-module pytest `
          --exclude-module doctest `
          --exclude-module PyQt5.QtQuick `
          --exclude-module PyQt5.QtQuick3D `
          --exclude-module PyQt5.QtQml `
          --exclude-module PyQt5.QtQuickWidgets `
          main.py
      shell: powershell

    - name: '10. 验证并打包构建产物 (Windows)'
      if: matrix.platform == 'windows'
      run: |
        if (Test-Path "dist\${{ matrix.output_name }}") {
          cd dist
          7z a -t7z -mx=9 -m0=lzma2 -mfb=64 -md=32m -ms=on ${{ matrix.output_name }}.7z ${{ matrix.output_name }}\*
        } else {
          Write-Host "构建失败: 输出目录未找到"
          exit 1
        }
      shell: powershell

    # ==================== 上传和发布 ====================
    - name: '11. 上传构建产物'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.output_name }}
        path: |
          dist/${{ matrix.output_name }}.tar.gz
          dist/${{ matrix.output_name }}.7z
        retention-days: 30
        if-no-files-found: ignore

    - name: '12. 上传到发布'
      if: github.event_name == 'release' && github.event.release.tag_name != ''
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.release.tag_name }}
        files: |
          dist/${{ matrix.output_name }}.tar.gz
          dist/${{ matrix.output_name }}.7z
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Sync GitHub Release to Gitee
      if: github.event_name == 'release'
      uses: trustedinster/sync-release-gitee@v1.3
      with:
        gitee_owner: tlju
        gitee_repo: niuma_gui
        gitee_token: ${{ secrets.GITEE_TOKEN }}
        github_owner: tlju
        github_repo: niuma_gui
        gitee_upload_retry_times: 3
        debug: true
