name: Build and Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  release:
    types: [ created ]

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.10'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x64
            platform: linux
            output_name: niuma-linux-x64
          - os: ubuntu-22.04
            arch: arm64
            platform: linux
            output_name: niuma-linux-arm64
          - os: windows-2022
            arch: x64
            platform: windows
            output_name: niuma-windows-x64.exe

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up QEMU (arm64)
      if: matrix.arch == 'arm64'
      uses: docker/setup-qemu-action@v2

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # 安装 Nuitka 构建依赖
        pip install nuitka ordered-set zstandard

    - name: Install build dependencies (Linux)
      if: matrix.platform == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache

    - name: Build with Nuitka
      run: |
        if [ "${{ matrix.platform }}" = "windows" ]; then
          python -m nuitka --standalone --onefile --windows-disable-console \
            --enable-plugin=pyqt6,cryptography,pydantic \
            --follow-imports \
            --nofollow-import-to=tkinter,matplotlib,numpy,pandas,scipy \
            --output-dir=dist \
            --output-filename=${{ matrix.output_name }} \
            main.py
        else
          python -m nuitka --standalone --onefile --disable-console \
            --enable-plugin=pyqt6,cryptography,pydantic \
            --follow-imports \
            --nofollow-import-to=tkinter,matplotlib,numpy,pandas,scipy \
            --output-dir=dist \
            --output-filename=${{ matrix.output_name }} \
            --lto=yes \
            main.py
        fi
      shell: bash

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.output_name }}
        path: dist/${{ matrix.output_name }}

    - name: Create Release
      if: github.event_name == 'release' && github.event.action == 'created'
      uses: softprops/action-gh-release@v1
      with:
        files: dist/${{ matrix.output_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
