name: 构建和发布

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.10'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x64
            platform: linux
            output_name: niuma-linux-x64
          - os: ubuntu-22.04
            arch: arm64
            platform: linux
            output_name: niuma-linux-arm64
          - os: windows-2022
            arch: x64
            platform: windows
            output_name: niuma-windows-x64.exe

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 QEMU (arm64)
      if: matrix.arch == 'arm64'
      uses: docker/setup-qemu-action@v3

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt
          .github/workflows/build.yml

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install nuitka ordered-set zstandard

    - name: 安装构建依赖 (Linux)
      if: matrix.platform == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache build-essential \
          libegl1 libgl1-mesa-glx libxkbcommon-x11-0 \
          libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
          libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
          libxcb-cursor0

    - name: 验证 Python 环境
      run: |
        python --version
        pip --version
        pip list | grep -i nuitka

    - name: 使用 Nuitka 构建
      run: |
        if [ "${{ matrix.platform }}" = "windows" ]; then
          python -m nuitka --standalone --onefile \
            --enable-plugin=pyqt6 \
            --follow-imports \
            --nofollow-import-to=tkinter,matplotlib,pandas,scipy,pytest,unittest,doctest \
            --include-package=paramiko \
            --include-package=bcrypt \
            --include-package=cryptography \
            --include-package=openpyxl \
            --include-package=xlsxwriter \
            --include-package=sqlalchemy \
            --include-package=pydantic \
            --include-package=pydantic_settings \
            --include-package=numpy \
            --include-package=pyqtgraph \
            --include-package=dotenv \
            --include-data-dir=gui/styles=gui/styles \
            --include-data-file=icons/app.ico=icons/app.ico \
            --windows-console-mode=disable \
            --output-dir=dist \
            --output-filename=${{ matrix.output_name }} \
            --assume-yes-for-downloads \
            --jobs=$(nproc) \
            --lto=yes \
            --include-package-data=pyqt6 \
            --windows-icon-from-ico=icons/app.ico \
            --remove-output \
            --no-progress-bar \
            main.py
        else
          python -m nuitka --standalone --onefile \
            --enable-plugin=pyqt6 \
            --follow-imports \
            --nofollow-import-to=tkinter,matplotlib,pandas,scipy,pytest,unittest,doctest \
            --include-package=paramiko \
            --include-package=bcrypt \
            --include-package=cryptography \
            --include-package=openpyxl \
            --include-package=xlsxwriter \
            --include-package=sqlalchemy \
            --include-package=pydantic \
            --include-package=pydantic_settings \
            --include-package=numpy \
            --include-package=pyqtgraph \
            --include-package=dotenv \
            --include-data-dir=gui/styles=gui/styles \
            --output-dir=dist \
            --output-filename=${{ matrix.output_name }} \
            --lto=yes \
            --assume-yes-for-downloads \
            --jobs=$(nproc) \
            --file-reference-choice=runtime \
            --include-package-data=pyqt6 \
            --linux-icon=icons/app.png \
            --remove-output \
            --no-progress-bar \
            main.py
        fi
      shell: bash

    - name: 验证构建输出
      run: |
        if [ -f "dist/${{ matrix.output_name }}" ]; then
          echo "构建成功: ${{ matrix.output_name }}"
          ls -lh dist/${{ matrix.output_name }}
        else
          echo "构建失败: 输出文件未找到"
          exit 1
        fi
      shell: bash

    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.output_name }}
        path: dist/${{ matrix.output_name }}
        retention-days: 30

    - name: 上传到发布
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: dist/${{ matrix.output_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-to-gitee:
    name: 同步到 Gitee
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    steps:
    - name: 检查 GITEE_TOKEN
      env:
        GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      run: |
        if [ -z "$GITEE_TOKEN" ]; then
          echo "GITEE_TOKEN 未配置，跳过同步到 Gitee"
          exit 0
        fi
        echo "has_token=true" >> $GITHUB_OUTPUT
      id: check-token

    - name: 检出代码
      if: steps.check-token.outputs.has_token == 'true'
      uses: actions/checkout@v4

    - name: 获取 Release 信息
      if: steps.check-token.outputs.has_token == 'true'
      id: release-info
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        RELEASE_INFO=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
          "https://api.github.com/repos/${{ github.repository }}/releases/latest")

        TAG_NAME=$(echo "$RELEASE_INFO" | jq -r '.tag_name')
        RELEASE_NAME=$(echo "$RELEASE_INFO" | jq -r '.name')
        RELEASE_BODY=$(echo "$RELEASE_INFO" | jq -r '.body')
        TARGET_COMMITISH=$(echo "$RELEASE_INFO" | jq -r '.target_commitish')
        PRERELEASE=$(echo "$RELEASE_INFO" | jq -r '.prerelease')

        echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
        echo "release_name=$RELEASE_NAME" >> $GITHUB_OUTPUT
        echo "target_commitish=$TARGET_COMMITISH" >> $GITHUB_OUTPUT
        echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT

        {
          echo "RELEASE_BODY<<EOF"
          echo "$RELEASE_BODY"
          echo "EOF"
        } >> $GITHUB_ENV

        echo "Release 标签: $TAG_NAME"

    - name: 下载构建产物
      if: steps.check-token.outputs.has_token == 'true'
      uses: actions/download-artifact@v4
      with:
        path: dist
        pattern: niuma-*
        merge-multiple: true

    - name: 列出下载的文件
      if: steps.check-token.outputs.has_token == 'true'
      run: |
        echo "=== 下载的构建产物 ==="
        ls -lh dist/

    - name: 同步到 Gitee Release
      if: steps.check-token.outputs.has_token == 'true'
