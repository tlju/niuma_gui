name: 缓存测试

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
  pull_request:

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.12'
  CACHE_VERSION: v2

jobs:
  cache-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x64
            platform: linux
            platform_name: linux/amd64
            output_name: niuma-linux-x64
            python_cache_name: python-env-linux-x64
          - os: ubuntu-22.04
            arch: arm64
            platform: linux
            platform_name: linux/arm64
            output_name: niuma-linux-arm64
            python_cache_name: python-env-linux-arm64
          - os: windows-2022
            arch: x64
            platform: windows
            output_name: niuma-windows-x64
            python_cache_name: python-env-windows-x64

    steps:
    - name: 检出代码
      uses: actions/checkout@v6

    - name: 设置 QEMU (arm64)
      if: matrix.arch == 'arm64'
      uses: docker/setup-qemu-action@v4

    - name: 显示缓存信息 (Linux)
      if: matrix.platform == 'linux'
      run: |
        echo "=== 缓存配置信息 ==="
        echo "平台: ${{ matrix.platform }}"
        echo "架构: ${{ matrix.arch }}"
        echo "Python 版本: ${{ env.PYTHON_VERSION }}"
        echo "缓存版本: ${{ env.CACHE_VERSION }}"
        echo "缓存名称: ${{ matrix.python_cache_name }}"
        echo ""
        echo "=== 预期缓存 Key ==="
        echo "${{ env.CACHE_VERSION }}-${{ matrix.python_cache_name }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}"

    - name: 显示缓存信息 (Windows)
      if: matrix.platform == 'windows'
      run: |
        Write-Host "=== 缓存配置信息 ==="
        Write-Host "平台: ${{ matrix.platform }}"
        Write-Host "架构: ${{ matrix.arch }}"
        Write-Host "Python 版本: ${{ env.PYTHON_VERSION }}"
        Write-Host "缓存版本: ${{ env.CACHE_VERSION }}"
        Write-Host "缓存名称: ${{ matrix.python_cache_name }}"
        Write-Host ""
        Write-Host "=== 预期缓存 Key ==="
        Write-Host "${{ env.CACHE_VERSION }}-${{ matrix.python_cache_name }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}"
      shell: powershell

    - name: 恢复 Python 缓存 (Linux)
      if: matrix.platform == 'linux'
      id: cache-python-linux
      uses: actions/cache@v5
      with:
        path: python-env-${{ matrix.arch }}.tar.gz
        key: ${{ env.CACHE_VERSION }}-${{ matrix.python_cache_name }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ env.CACHE_VERSION }}-${{ matrix.python_cache_name }}-${{ env.PYTHON_VERSION }}-
          ${{ env.CACHE_VERSION }}-${{ matrix.python_cache_name }}-

    - name: 恢复 Python 缓存 (Windows)
      if: matrix.platform == 'windows'
      id: cache-python-windows
      uses: actions/cache@v5
      with:
        path: python-env-${{ matrix.arch }}.7z
        key: ${{ env.CACHE_VERSION }}-${{ matrix.python_cache_name }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ env.CACHE_VERSION }}-${{ matrix.python_cache_name }}-${{ env.PYTHON_VERSION }}-
          ${{ env.CACHE_VERSION }}-${{ matrix.python_cache_name }}-

    - name: 检查缓存命中状态 (Linux)
      if: matrix.platform == 'linux'
      run: |
        echo "=== 缓存命中状态 ==="
        if [ "${{ steps.cache-python-linux.outputs.cache-hit }}" = "true" ]; then
          echo "缓存命中！"
          echo "缓存文件信息:"
          ls -lh python-env-${{ matrix.arch }}.tar.gz || echo "缓存文件不存在"
        else
          echo "缓存未命中"
          echo "将执行 Python 环境构建..."
        fi

    - name: 检查缓存命中状态 (Windows)
      if: matrix.platform == 'windows'
      run: |
        Write-Host "=== 缓存命中状态 ==="
        if ("${{ steps.cache-python-windows.outputs.cache-hit }}" -eq "true") {
          Write-Host "缓存命中！"
          Write-Host "缓存文件信息:"
          Get-Item python-env-${{ matrix.arch }}.7z -ErrorAction SilentlyContinue | Select-Object Name, Length, LastWriteTime
        } else {
          Write-Host "缓存未命中"
          Write-Host "将执行 Python 环境构建..."
        }
      shell: powershell

    - name: 设置 Python (Windows)
      if: matrix.platform == 'windows' && steps.cache-python-windows.outputs.cache-hit != 'true'
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 安装依赖 (Windows)
      if: matrix.platform == 'windows' && steps.cache-python-windows.outputs.cache-hit != 'true'
      run: |
        Write-Host "=== 安装 Python 依赖 ==="
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install nuitka ordered-set zstandard
        Write-Host "=== 依赖安装完成 ==="
        pip list
      shell: powershell

    - name: 打包 Python 环境 (Windows)
      if: matrix.platform == 'windows' && steps.cache-python-windows.outputs.cache-hit != 'true'
      run: |
        Write-Host "=== 打包 Python 环境 ==="
        $pythonPath = python -c "import sys; print(sys.prefix)"
        Write-Host "Python 路径: $pythonPath"
        7z a -t7z -mx=9 python-env-${{ matrix.arch }}.7z "$pythonPath\*"
        Write-Host "=== 打包完成 ==="
        Get-Item python-env-${{ matrix.arch }}.7z | Select-Object Name, Length, LastWriteTime
      shell: powershell

    - name: 恢复 Python 环境 (Windows)
      if: matrix.platform == 'windows' && steps.cache-python-windows.outputs.cache-hit == 'true'
      run: |
        Write-Host "=== 恢复 Python 环境 ==="
        $destPath = "$env:LOCALAPPDATA\python-cache"
        New-Item -ItemType Directory -Force -Path $destPath
        7z x python-env-${{ matrix.arch }}.7z -o"$destPath" -y
        Add-Content -Path $env:GITHUB_PATH -Value "$destPath\Scripts"
        Add-Content -Path $env:GITHUB_PATH -Value "$destPath"
        Write-Host "=== 环境恢复完成 ==="
        python --version
        pip --version
      shell: powershell

    - name: 构建 Python 环境 (Linux)
      if: matrix.platform == 'linux' && steps.cache-python-linux.outputs.cache-hit != 'true'
      run: |
        echo "=== 构建 Python 环境 ==="
        docker run --rm \
          --platform ${{ matrix.platform_name }} \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          debian:10.10 \
          bash -c '
            set -e
            
            echo "=== 配置 apt 源 ==="
            echo "deb http://archive.debian.org/debian buster main" > /etc/apt/sources.list
            echo "deb http://archive.debian.org/debian buster-updates main" >> /etc/apt/sources.list
            echo "Acquire::Check-Valid-Until false;" > /etc/apt/apt.conf.d/99no-check-valid-until
            
            echo "=== 安装系统依赖 ==="
            apt-get update
            apt-get install -y gcc g++ make wget zlib1g-dev libffi-dev libssl-dev
            
            echo "=== 编译 Python 3.12 ==="
            cd /tmp
            wget -q https://www.python.org/ftp/python/3.12.13/Python-3.12.13.tgz
            tar xzf Python-3.12.13.tgz
            cd Python-3.12.13
            ./configure --enable-optimizations --prefix=/usr/local/python3.12
            make -j$(nproc)
            make install
            
            echo "=== 安装 Python 依赖 ==="
            cd /workspace
            /usr/local/python3.12/bin/python3.12 -m pip install --upgrade pip setuptools wheel
            /usr/local/python3.12/bin/pip3.12 install -r requirements.txt
            /usr/local/python3.12/bin/pip3.12 install nuitka ordered-set zstandard
            
            echo "=== 打包 Python 环境 ==="
            cd /usr/local
            tar -czf /workspace/python-env-${{ matrix.arch }}.tar.gz python3.12
            ls -lh /workspace/python-env-${{ matrix.arch }}.tar.gz
          '

    - name: 验证 Python 环境 (Linux)
      if: matrix.platform == 'linux'
      run: |
        echo "=== 验证 Python 环境 ==="
        if [ -f "python-env-${{ matrix.arch }}.tar.gz" ]; then
          echo "缓存文件存在"
          ls -lh python-env-${{ matrix.arch }}.tar.gz
          
          echo "=== 测试解压 ==="
          docker run --rm \
            --platform ${{ matrix.platform_name }} \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            debian:10.10 \
            bash -c '
              set -e
              cd /usr/local
              tar -xzf /workspace/python-env-${{ matrix.arch }}.tar.gz
              ln -sf /usr/local/python3.12/bin/python3.12 /usr/local/bin/python3
              python3 --version
              python3 -c "import sys; print(sys.executable)"
            '
        else
          echo "缓存文件不存在"
          exit 1
        fi

    - name: 验证 Python 环境 (Windows)
      if: matrix.platform == 'windows'
      run: |
        Write-Host "=== 验证 Python 环境 ==="
        python --version
        pip --version
        python -c "import sys; print(sys.executable)"
        Write-Host "Python 环境验证成功"
      shell: powershell

    - name: 上传缓存文件
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.output_name }}-cache
        path: |
          python-env-${{ matrix.arch }}.tar.gz
          python-env-${{ matrix.arch }}.7z
        retention-days: 7

    - name: 测试总结 (Linux)
      if: matrix.platform == 'linux'
      run: |
        echo "========================================"
        echo "缓存测试总结"
        echo "========================================"
        echo "平台: ${{ matrix.platform }} (${{ matrix.arch }})"
        if [ "${{ steps.cache-python-linux.outputs.cache-hit }}" = "true" ]; then
          echo "缓存状态: 命中"
        else
          echo "缓存状态: 未命中 (已构建新缓存)"
        fi
        echo "========================================"

    - name: 测试总结 (Windows)
      if: matrix.platform == 'windows'
      run: |
        Write-Host "========================================"
        Write-Host "缓存测试总结"
        Write-Host "========================================"
        Write-Host "平台: ${{ matrix.platform }} (${{ matrix.arch }})"
        if ("${{ steps.cache-python-windows.outputs.cache-hit }}" -eq "true") {
          Write-Host "缓存状态: 命中"
        } else {
          Write-Host "缓存状态: 未命中 (已构建新缓存)"
        }
        Write-Host "========================================"
      shell: powershell
