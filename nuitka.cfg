[nuitka]
# 主文件
main = main.py

# 输出设置
standalone = 1
onefile = 1

# 输出目录
output_dir = dist

# 可执行文件名称
output_filename = niuma_gui

# 禁用控制台窗口
windows_disable_console = 1

# 优化级别
follow_imports = 1

# 包含的数据目录
data_dir = models=models
data_dir = services=services
data_dir = core=core
data_dir = gui=gui

# 插件配置（只有 PyQt6 有官方支持，其他通过 follow-imports 处理）
plugins = PyQt6

# 排除不需要的模块
nofollow_import_to = tkinter,matplotlib,numpy,scipy

# 编译优化
lto = yes
assume_yes_for_downloads = yes
